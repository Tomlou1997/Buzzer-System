<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎯 抢答系统 · 客户端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;}

.container{width:100%;max-width:900px;min-height:100vh;padding:24px 20px;display:flex;flex-direction:column;}

/* 登录页 */
.login-box{background:#1a1a2e;border-radius:16px;padding:40px 32px;text-align:center;border:1px solid #2a2a3e;max-width:420px;margin:auto;width:100%;}
.login-box .logo{font-size:56px;margin-bottom:12px;}
.login-box h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#0078d4,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.login-box p{color:#888;font-size:14px;margin-bottom:24px;}
.login-box .field{margin-bottom:16px;text-align:left;}
.login-box .field label{display:block;font-size:12px;color:#888;margin-bottom:4px;}
.login-box .field input{width:100%;padding:12px 16px;background:#252538;border:1px solid #333;border-radius:8px;color:#fff;font-size:18px;outline:none;transition:.2s;}
.login-box .field input:focus{border-color:#0078d4;box-shadow:0 0 0 3px rgba(0,120,212,0.15);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0078d4,#005a9e);border:none;border-radius:8px;color:#fff;font-size:17px;font-weight:600;cursor:pointer;transition:.2s;margin-top:12px;}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,120,212,0.3);}
.login-btn:active{transform:scale(.97);}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.error-msg{color:#f44336;font-size:13px;margin-top:10px;min-height:20px;}

/* 主界面 - 等待中 */
.game-box{display:none;flex:1;flex-direction:column;gap:14px;justify-content:center;}
.game-box.show{display:flex;}

/* 状态栏 */
.status-bar{background:#1a1a2e;border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.status-bar .left{display:flex;align-items:center;gap:8px;}
.status-bar .dot{width:8px;height:8px;border-radius:50%;}
.status-bar .dot.green{background:#4CAF50;box-shadow:0 0 12px rgba(76,175,80,0.5);animation:pulse 2s infinite;}
.status-bar .dot.yellow{background:#FF9800;box-shadow:0 0 12px rgba(255,152,0,0.5);animation:pulse 1s infinite;}
.status-bar .dot.purple{background:#9C27B0;}
.status-bar .dot.red{background:#f44336;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.status-bar .name{font-size:14px;font-weight:600;}

/* 积分框（比赛开始后显示） */
.score-card{display:none;background:linear-gradient(135deg,#1a2a3e,#0d1a2e);border:2px solid #0078d4;border-radius:16px;padding:20px 16px;text-align:center;box-shadow:0 4px 24px rgba(0,120,212,0.2);}
.score-card.show{display:block;}
.score-card .score-label{font-size:13px;color:#0078d4;font-weight:600;letter-spacing:3px;margin-bottom:2px;}
.score-card .score-value{font-size:56px;font-weight:800;color:#fff;text-shadow:0 0 20px rgba(0,120,212,0.5);line-height:1.1;}
.score-card .score-value.positive{color:#4CAF50;}
.score-card .score-value.negative{color:#f44336;}
.status-bar .score{font-size:18px;font-weight:bold;color:#0078d4;display:none;}

/* 排名小条 */
.rank-bar{display:none;background:linear-gradient(135deg,#FFD700,#FFB300);border-radius:10px;padding:10px 16px;text-align:center;font-size:15px;font-weight:700;color:#1a1a2e;animation:slideIn .3s ease;}
.rank-bar.show{display:block;}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}

/* 题目卡片 */
.question-card{display:none;background:#1a1a2e;border-radius:14px;padding:28px 24px;border:1px solid #2a2a3e;flex-direction:column;gap:16px;}
.question-card.show{display:flex;}
.question-card .qtype{font-size:12px;color:#0078d4;font-weight:600;}
.question-card .qtext{font-size:20px;line-height:1.8;min-height:80px;}
.question-card .options{display:flex;flex-direction:column;gap:6px;}
.opt-btn{display:block;width:100%;padding:12px 16px;background:#252538;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;cursor:pointer;text-align:left;transition:.15s;}
.opt-btn:hover{background:#2a2a3e;border-color:#555;}
.opt-btn.selected{border-color:#4CAF50;background:rgba(76,175,80,0.15);color:#4CAF50;}
.opt-btn.correct{border-color:#4CAF50;background:rgba(76,175,80,0.15);}
.opt-btn.wrong{border-color:#f44336;background:rgba(244,67,54,0.15);}
.opt-btn:disabled{cursor:not-allowed;opacity:.7;}

/* 提交答案按钮 */
.submit-ans-btn{width:100%;padding:14px;background:linear-gradient(135deg,#4CAF50,#388E3C);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;}
.submit-ans-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(76,175,80,0.3);}
.submit-ans-btn:active{transform:scale(.97);}
.submit-ans-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* 抢答按钮 */
.buzzer-wrap{display:none;justify-content:center;margin:16px 0;}
.buzzer-wrap.show{display:flex;}
.buzzer{width:170px;height:170px;border-radius:50%;border:none;background:linear-gradient(135deg,#f44336,#d32f2f);color:#fff;font-size:26px;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 8px 32px rgba(244,67,54,0.4);position:relative;overflow:hidden;}
.buzzer::after{content:'';position:absolute;top:-30%;left:-30%;width:160%;height:160%;background:radial-gradient(circle,rgba(255,255,255,0.15) 0%,transparent 70%);}
.buzzer:active{transform:scale(.92);box-shadow:0 4px 16px rgba(244,67,54,0.3);}
.buzzer:disabled{opacity:.5;transform:scale(.95);cursor:not-allowed;}
.buzzer .sub{display:block;font-size:13px;font-weight:400;opacity:.8;margin-top:4px;}

/* 抢答结果 */
.buzzer-result{display:none;text-align:center;padding:16px;border-radius:12px;font-size:15px;font-weight:600;}
.buzzer-result.show{display:block;}
.buzzer-result.success{background:linear-gradient(135deg,rgba(76,175,80,0.2),rgba(76,175,80,0.1));border:1px solid rgba(76,175,80,0.3);color:#4CAF50;}
.buzzer-result.fail{background:linear-gradient(135deg,rgba(244,67,54,0.2),rgba(244,67,54,0.1));border:1px solid rgba(244,67,54,0.3);color:#f44336;}
.buzzer-result.too-late{background:linear-gradient(135deg,rgba(255,152,0,0.2),rgba(255,152,0,0.1));border:1px solid rgba(255,152,0,0.3);color:#FF9800;}

/* 倒计时框（左上角固定） */
.countdown-box{display:none;position:fixed;top:20px;left:20px;z-index:999;background:#1a1a2e;border:2px solid #FF9800;border-radius:14px;padding:16px 24px;text-align:center;min-width:140px;box-shadow:0 4px 24px rgba(255,152,0,0.3);}
.countdown-box.show{display:block;}
.countdown-box.urgent{border-color:#f44336;box-shadow:0 4px 24px rgba(244,67,54,0.4);animation:countdownBeat .5s infinite;}
.countdown-label{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.countdown-num{font-size:192px;font-weight:900;color:#FF9800;line-height:1;font-variant-numeric:tabular-nums;}
.countdown-box.urgent .countdown-num{color:#f44336;}
.countdown-cheer{display:none;position:fixed;top:310px;left:62px;z-index:999;padding:10px 24px;background:linear-gradient(135deg,#9C27B0,#7B1FA2);border:none;border-radius:24px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;}
.countdown-cheer.show{display:block;}
.countdown-cheer:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(156,39,176,0.4);}
.countdown-cheer:disabled{opacity:.4;cursor:not-allowed;}
.countdown-cheer:not(:disabled):active{transform:scale(.95);}
@keyframes countdownBeat{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* 答案输入 */
.answer-box{display:none;flex-direction:column;gap:8px;}
.answer-box.show{display:flex;}
.answer-box textarea{width:100%;padding:10px 14px;background:#252538;border:1px solid #333;border-radius:8px;color:#fff;font-size:14px;resize:none;height:60px;outline:none;font-family:inherit;}
.answer-box textarea:focus{border-color:#0078d4;}
.answer-box .actions{display:flex;gap:6px;}
.answer-box .actions .btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}

/* 比赛结果 */
.result-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;}
.result-overlay.show{display:flex;}
.result-box{background:#1a1a2e;border-radius:20px;padding:40px 36px;text-align:center;max-width:620px;width:95%;max-height:92vh;overflow-y:auto;border:1px solid #333;}
.result-box .trophy{font-size:72px;margin-bottom:10px;}
.result-box h2{font-size:26px;margin-bottom:16px;}
.result-box .podium{display:flex;gap:16px;justify-content:center;padding:20px 0;}
.result-box .podium-item{background:#252538;border-radius:12px;padding:16px 12px;flex:1;text-align:center;}
.result-box .podium-item .medal{font-size:34px;margin-bottom:6px;}
.result-box .podium-item .pname{font-size:15px;font-weight:600;}
.result-box .podium-item .pscore{font-size:14px;color:#888;}

/* 积分榜单 */
.result-table{margin-top:12px;text-align:left;}
.result-table .rt-row{display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid #1a1a2e;font-size:18px;}
.result-table .rt-rank{width:36px;text-align:center;font-weight:700;font-size:22px;}
.result-table .rt-name{flex:1;text-align:left;font-weight:500;}
.result-table .rt-score{font-weight:700;min-width:60px;text-align:right;font-size:20px;}
.result-table .rt-gold{color:#FFD700;}
.result-table .rt-silver{color:#C0C0C0;}
.result-table .rt-bronze{color:#CD7F32;}
.result-table .rt-me{background:#1a2a4a;border-left:3px solid #0078d4;}

/* 底部状态 */
.footer-info{text-align:center;color:#555;font-size:11px;margin-top:auto;padding-top:16px;}

/* 手机端触摸优化 */
@media(max-width:400px){
  .buzzer{width:120px;height:120px;font-size:18px;}
  .container{padding:10px;}
}

/* 闪烁提示 */
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* 个人获胜遮罩 */
.won-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,20,.92);backdrop-filter:blur(12px);z-index:90;align-items:center;justify-content:center;}
.won-overlay.show{display:flex;}
.won-box{text-align:center;max-width:340px;width:90%;}
.won-box .won-icon{font-size:80px;margin-bottom:8px;}
.won-box .won-rank{font-size:52px;font-weight:900;background:linear-gradient(135deg,#FFD700,#FFA000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.won-box .won-score{font-size:20px;color:#aaa;margin-bottom:16px;}
.won-box .won-hint{font-size:16px;color:#4CAF50;padding:12px 0;border-top:1px solid #333;}
</style>
</head>
<body>

<div class="container">

  <!-- 登录页 -->
  <div class="login-box" id="loginBox" style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <div class="logo">🎯</div>
    <h1>抢答系统</h1>
    <p>输入昵称加入比赛</p>
    <div class="field">
      <label>👤 昵称</label>
      <input type="text" id="nameInput" maxlength="12" placeholder="输入你的名字" autocomplete="off">
    </div>
    <div class="error-msg" id="loginError"></div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">🔔 加入比赛</button>
  </div>

  <!-- 比赛界面 -->
  <div class="game-box" id="gameBox">

    <!-- 状态栏 -->
    <div class="status-bar">
      <div class="left">
        <div class="dot green" id="statusDot"></div>
        <span class="name" id="myName">--</span>
      </div>
    </div>

    <!-- 积分框（比赛开始后才显示） -->
    <div class="score-card" id="scoreCard">
      <div class="score-label">积分</div>
      <div class="score-value" id="myScore">0</div>
    </div>

    <!-- 排名 -->
    <div class="rank-bar" id="rankBar">
      🏆 <span id="rankText">第 1 名</span>
    </div>

    <!-- 题目 -->
    <div class="question-card" id="questionCard">
      <div class="qtype" id="qType">📝 题目</div>
      <div class="qtext" id="qText" style="font-size:28px;font-weight:700;">等待管理员开始比赛...</div>
      <div class="options" id="optionsDiv"></div>
      <!-- 提交答案按钮（在题目下方） -->
      <button class="submit-ans-btn" id="submitAnsBtn" onclick="submitSelectedOptions()" style="display:none;">✅ 提交答案</button>
    </div>

    <!-- 抢答按钮 -->
    <div class="buzzer-wrap" id="buzzerWrap">
      <button class="buzzer" id="buzzerBtn" onclick="buzz()">
        🔔
        <span class="sub">抢答</span>
      </button>
    </div>

    <!-- 抢答结果 -->
    <div class="buzzer-result" id="buzzerResult"></div>

    <!-- 倒计时框（左上角固定，答题时显示） -->
    <div class="countdown-box" id="countdownBox">
      <div class="countdown-label">答题倒计时</div>
      <div class="countdown-num" id="countdownNum">15</div>
    </div>
    <!-- 啦啦队按钮（倒计时框下方） -->
    <button class="countdown-cheer" id="cheerBtn" onclick="useCheer()">📣 啦啦队 (+15s)</button>
  </div>

  <!-- 比赛结果 -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-box">
      <div class="trophy">🏆</div>
      <h2>比赛结束</h2>
      <div class="podium" id="podiumDiv"></div>
      <div class="result-table" id="resultTable"></div>
      <button class="login-btn" onclick="location.reload()" style="margin-top:12px;">🔄 重新加入</button>
    </div>
  </div>

  <!-- 个人获胜提示（覆盖在比赛界面上） -->
  <div class="won-overlay" id="wonOverlay">
    <div class="won-box">
      <div class="won-icon">🏆</div>
      <div class="won-rank" id="wonRank">第 1 名</div>
      <div class="won-score" id="wonScore">0 分</div>
      <div class="won-hint">🎉 恭喜！比赛继续...</div>
    </div>
  </div>

  <div class="footer-info">🎯 抢答系统 v2.0</div>
</div>

<script>
let ws = null;
let myName = '';
let myScore = 0;
let myRank = 0;
let myRanked = false;
let clientState = null;
let isBuzzing = false;
let hasBuzzed = false;
let answerTimeout = null;
let answerTimerInterval = null;
let currentQuestionId = null;

// ========== 连接 ==========
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws/player?name=${encodeURIComponent(myName)}`);

  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    handleMsg(msg);
  };

  ws.onclose = function(e) {
    setStatus('red', '已断开', 'red');
    showBuzzerResult('fail', '⚠️ 与服务器断开连接...');
    if (window._stopReconnect) return;
    setTimeout(() => {
      if (myName) connect();
    }, 3000);
  };
}

function send(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

// ========== 消息处理 ==========
function handleMsg(msg) {
  console.log('收到消息:', msg);

  switch (msg.type) {
    case 'error':
      document.getElementById('loginError').textContent = msg.msg;
      // 重名等错误，返回登录页，停止重连
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('loginBtn').textContent = '🔔 加入比赛';
      myName = '';
      window._stopReconnect = true;
      if (ws) { ws.close(); }
      break;

    case 'login_ok':
      window._stopReconnect = false;
      myName = msg.name;
      myScore = msg.score || 0;
      document.getElementById('myName').textContent = myName;
      document.getElementById('myScore').textContent = myScore;
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('gameBox').classList.add('show');
      setStatus('green', '已连接', 'green');
      break;

    case 'client_state':
      clientState = msg;
      renderClientState(msg);
      break;

    case 'buzz_result':
      if (msg.success) {
        hasBuzzed = true;
        showBuzzerResult('success', '🎉 抢答成功！请回答');
        setStatus('green', '🎉 抢答成功！答题中...', 'green');
        // 显示提交按钮（在有选项的情况下）
        document.getElementById('submitAnsBtn').style.display = 'block';
        isBuzzing = true;
        startAnswerTimer(msg.timeout || 15);
      } else {
        showBuzzerResult('fail', '⏱ 被抢答了，下次加油！');
        isBuzzing = false;
      }
      break;

    case 'buzz_too_late':
      showBuzzerResult('too_late', '⌛ 本轮无人抢答');
      isBuzzing = false;
      break;

    case 'answer_result':
      isBuzzing = false;
      clearTimeout(answerTimeout);
      clearInterval(answerTimerInterval);
      document.getElementById('countdownBox').className = 'countdown-box';
      document.getElementById('cheerBtn').className = 'countdown-cheer';
      document.getElementById('submitAnsBtn').style.display = 'none';
      if (msg.correct) {
        showBuzzerResult('success', '✅ 回答正确！+' + msg.points + '分');
        myScore = msg.new_score;
        document.getElementById('myScore').textContent = myScore;
      } else {
        // 直接显示服务端发来的消息（超时/答错等）
        showBuzzerResult('fail', msg.msg || '❌ 回答错误');
        myScore = msg.new_score;
        document.getElementById('myScore').textContent = myScore;
      }
      break;

    case 'round_cleared':
      // 本轮结束，重置状态
      isBuzzing = false;
      hasBuzzed = false;
      clearTimeout(answerTimeout);
      clearInterval(answerTimerInterval);
      document.getElementById('submitAnsBtn').style.display = 'none';
      document.getElementById('countdownBox').className = 'countdown-box';
      document.getElementById('cheerBtn').className = 'countdown-cheer';
      document.getElementById('buzzerWrap').classList.remove('show');
      document.getElementById('questionCard').classList.remove('show');
      break;

    case 'score_update':
      if (msg.name === myName) {
        myScore = msg.score;
        document.getElementById('myScore').textContent = myScore;
      }
      break;

    case 'extend_result':
      if (msg.success) {
        showBuzzerResult('success', msg.msg);
        startAnswerTimer(msg.time_remaining);
        document.getElementById('cheerBtn').disabled = true;
        document.getElementById('cheerBtn').textContent = '📣 已使用';
      } else {
        showBuzzerResult('fail', msg.msg);
      }
      break;

    case 'extend_broadcast':
      // 别人用了啦啦队，更新倒计时显示
      break;

    case 'game_over':
      showResult(msg);
      break;

    case 'scores_reset':
      myScore = 0;
      myRank = 0;
      myRanked = false;
      document.getElementById('myScore').textContent = 0;
      document.getElementById('wonOverlay').classList.remove('show');
      setStatus('green', '已连接', 'green');
      break;

    case 'rank_locked':
      if (msg.name === myName) {
        myRank = msg.rank;
        myRanked = true;
        showWonOverlay(msg.rank);
      }
      break;

    case 'restart_game':
      isBuzzing = false;
      hasBuzzed = false;
      currentQuestionId = null;
      myScore = 0;
      document.getElementById('myScore').textContent = 0;
      document.getElementById('scoreCard').classList.remove('show');
      document.getElementById('submitAnsBtn').style.display = 'none';
      document.getElementById('countdownBox').className = 'countdown-box';
      document.getElementById('cheerBtn').className = 'countdown-cheer';
      document.getElementById('buzzerResult').classList.remove('show');
      document.getElementById('buzzerWrap').classList.remove('show');
      document.getElementById('questionCard').classList.remove('show');
      document.getElementById('resultOverlay').classList.remove('show');
      document.getElementById('wonOverlay').classList.remove('show');
      document.getElementById('rankBar').classList.remove('show');
      setStatus('green', '已连接 — 等待开始', 'green');
      break;
  }
}

// ========== 渲染客户端状态 ==========
function renderClientState(s) {
  // 只显示自己的分数
  myScore = s.my_score || 0;
  myRank = s.my_rank || 0;
  myRanked = s.my_ranked || false;
  document.getElementById('myScore').textContent = myScore;

  // 已获得排名：显示获胜遮罩，隐藏正常UI
  if (myRanked && !s.game_over) {
    document.getElementById('wonOverlay').classList.add('show');
    document.getElementById('wonRank').textContent = `第 ${myRank} 名`;
    document.getElementById('wonScore').textContent = `${myScore} 分`;
    document.getElementById('buzzerWrap').classList.remove('show');
    document.getElementById('questionCard').classList.remove('show');
    document.getElementById('buzzerResult').classList.remove('show');
    document.getElementById('countdownBox').className = 'countdown-box';
      document.getElementById('cheerBtn').className = 'countdown-cheer';
    document.getElementById('submitAnsBtn').style.display = 'none';
    clearInterval(answerTimerInterval);
    clearTimeout(answerTimeout);
    setStatus('purple', `🏆 已获得第${myRank}名`, 'purple');
    return;
  }

  // 积分框：比赛开始后才显示
  const scoreCard = document.getElementById('scoreCard');
  if (s.game_started) {
    scoreCard.classList.add('show');
  } else {
    scoreCard.classList.remove('show');
  }

  // 状态指示
  if (s.game_over) {
    setStatus('purple', '比赛已结束', 'purple');
    // 只在首次时显示结果（game_over消息已触发过）
    if (!document.getElementById('resultOverlay').classList.contains('show')) {
      showResult(s);
    }
    return;
  }

  if (!s.game_started) {
    setStatus('green', '等待管理员开始比赛...', 'green');
    document.getElementById('buzzerWrap').classList.remove('show');
    document.getElementById('questionCard').classList.remove('show');
    return;
  }

  // 自己的排名（只显示自己，不显示其他选手）
  if (s.my_rank && s.my_rank <= 3) {
    const rankEmoji = {1:'🥇',2:'🥈',3:'🥉'};
    document.getElementById('rankBar').classList.add('show');
    document.getElementById('rankText').textContent = `${rankEmoji[s.my_rank]||''} 第 ${s.my_rank} 名`;
  } else {
    document.getElementById('rankBar').classList.remove('show');
  }

  // 题目
  if (s.current_question) {
    const q = s.current_question;
    // 新题目出现时清除上一题的答题结果
    if (currentQuestionId !== q.question) {
      document.getElementById('buzzerResult').classList.remove('show', 'success', 'fail', 'too_late');
      document.getElementById('countdownBox').className = 'countdown-box';
      document.getElementById('cheerBtn').className = 'countdown-cheer';
    }
    currentQuestionId = q.question;
    document.getElementById('questionCard').classList.add('show');
    document.getElementById('qType').textContent = '📝 ' + (q.type || '题目');
    document.getElementById('qText').innerHTML = q.question;

    // 选项（选择题）
    const optsDiv = document.getElementById('optionsDiv');
    if (q.options && q.options.length) {
      optsDiv.style.display = 'flex';
      optsDiv.innerHTML = q.options.map((opt, i) => {
        const iAmAnswering = isBuzzing || s.first_buzzer === myName;
        const disabled = !iAmAnswering ? 'disabled' : '';
        return `<button class="opt-btn" data-idx="${i}" onclick="selectOption(this, ${i})" ${disabled}>${opt}</button>`;
      }).join('');
      // 自己抢到了才显示提交按钮
      const iAmAnswering = isBuzzing || s.first_buzzer === myName;
      document.getElementById('submitAnsBtn').style.display = iAmAnswering ? 'block' : 'none';
      document.getElementById('submitAnsBtn').disabled = false;
      document.getElementById('submitAnsBtn').textContent = '✅ 提交答案';
    } else {
      optsDiv.style.display = 'none';
    }
  } else {
    document.getElementById('questionCard').classList.remove('show');
  }

  // 抢答按钮
  if (s.can_buzz && !s.game_over) {
    document.getElementById('buzzerResult').classList.remove('show', 'success', 'fail', 'too_late');
    document.getElementById('countdownBox').className = 'countdown-box';
      document.getElementById('cheerBtn').className = 'countdown-cheer';
    document.getElementById('buzzerWrap').classList.add('show');
    document.getElementById('buzzerBtn').disabled = false;
    document.getElementById('buzzerBtn').innerHTML = '🔔<span class="sub">抢答</span>';
    setStatus('yellow', '🟢 可抢答!', 'yellow');
  } else if (s.round_active && !s.can_buzz) {
    if (!hasBuzzed) {
      document.getElementById('buzzerWrap').classList.add('show');
      document.getElementById('buzzerBtn').disabled = true;
      document.getElementById('buzzerBtn').innerHTML = '⏳<span class="sub">等待...</span>';
      setStatus('yellow', '⏳ 等待抢答', 'yellow');
    } else {
      // 已经抢到，正在答题
      setStatus('green', '🎉 答题中...', 'green');
    }
  } else if (!s.round_active && s.game_started && !s.game_over) {
    document.getElementById('buzzerWrap').classList.remove('show');
    setStatus('green', '等待抢答开始', 'green');
  }

  // 啦啦队（延长时间）
  if (s.can_cheer && s.cheer_remaining > 0) {
    document.getElementById('cheerBtn').disabled = false;
    document.getElementById('cheerBtn').textContent = `📣 啦啦队 (剩余${s.cheer_remaining}次)`;
  } else {
  }
}

// 去掉 renderPlayers 函数 — 选手不在客户端看到其他选手

// ========== 操作 ==========
function doLogin() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) {
    document.getElementById('loginError').textContent = '请输入昵称';
    return;
  }
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = '⏳ 连接中...';
  myName = name;
  connect();
}

function buzz() {
  if (hasBuzzed) return;
  hasBuzzed = true;
  document.getElementById('buzzerBtn').disabled = true;
  document.getElementById('buzzerBtn').innerHTML = '✨<span class="sub">已按下!</span>';
  send({type: 'buzz'});
}

function submitAnswer() {
  const answer = document.getElementById('answerInput').value.trim();
  if (!answer) {
    alert('请输入答案');
    return;
  }
  clearTimeout(answerTimeout);
  document.getElementById('answerInput').disabled = true;
  send({type: 'answer', answer: answer});
}

function submitWrong() {
  clearTimeout(answerTimeout);
  send({type: 'answer', answer: ''});
}

function selectOption(el, idx) {
  const qType = document.getElementById('qType').textContent;
  const isMulti = qType.includes('多选');
  const isSingle = qType.includes('单选');
  
  if (isSingle) {
    // 单选：清除其他选中，只选当前
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  } else if (isMulti) {
    // 多选：切换当前选项
    el.classList.toggle('selected');
  } else {
    // 判断或默认：单项选择
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }
}

function submitSelectedOptions() {
  // 收集所有选中的选项索引
  const selected = document.querySelectorAll('.opt-btn.selected');
  if (selected.length === 0) {
    alert('请至少选择一个答案');
    return;
  }
  const indices = Array.from(selected).map(b => b.dataset.idx);
  clearTimeout(answerTimeout);
  send({type: 'answer', answer: indices.join(',')});
  document.getElementById('submitAnsBtn').disabled = true;
  document.getElementById('submitAnsBtn').textContent = '⏳ 已提交';
}

function useCheer() {
  send({type: 'cheer'});
  document.getElementById('cheerBtn').disabled = true;
  document.getElementById('cheerBtn').textContent = '📣 已发送';
}

function startAnswerTimer(seconds) {
  clearTimeout(answerTimeout);
  clearInterval(answerTimerInterval);
  const btn = document.getElementById('submitAnsBtn');
  const cd = document.getElementById('countdownBox');
  const cdNum = document.getElementById('countdownNum');
  const cb2 = document.getElementById('cheerBtn');
  btn.textContent = `✅ 提交答案 (${seconds}s)`;
  cdNum.textContent = seconds;
  cd.className = 'countdown-box show' + (seconds <= 5 ? ' urgent' : '');
  cb2.className = 'countdown-cheer show';
  answerTimeout = setTimeout(() => {
    if (isBuzzing) {
      isBuzzing = false;
      send({type: 'answer', answer: ''});
      btn.style.display = 'none';
      cd.className = 'countdown-box';
      cb2.className = 'countdown-cheer';
      showBuzzerResult('fail', '⌛ 答题超时');
    }
  }, seconds * 1000);

  // 倒计时
  let remaining = seconds;
  answerTimerInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(answerTimerInterval);
      cd.className = 'countdown-box';
      cb2.className = 'countdown-cheer';
      return;
    }
    btn.textContent = `✅ 提交答案 (${remaining}s)`;
    cdNum.textContent = remaining;
    cd.className = 'countdown-box show' + (remaining <= 5 ? ' urgent' : '');
  }, 1000);
}

// ========== UI 辅助 ==========
function setStatus(dotClass, text, textClass) {
  document.getElementById('statusDot').className = 'dot ' + dotClass;
  document.getElementById('myName').textContent = myName + (textClass ? ' · ' + text : '');
}

function showBuzzerResult(cls, text) {
  const el = document.getElementById('buzzerResult');
  el.className = 'buzzer-result show ' + cls;
  el.textContent = text;
}

function showResult(s) {
  document.getElementById('resultOverlay').classList.add('show');
  const podium = document.getElementById('podiumDiv');
  const medals = {1:'🥇',2:'🥈',3:'🥉'};

  // 直接使用服务端排名数据，保持和积分榜一致
  const rankings = s.rankings || s.ranked_players || [];

  // 领奖台（前三名）
  const top3 = rankings.filter(r => r.rank >= 1 && r.rank <= 3).sort((a, b) => a.rank - b.rank);
  podium.innerHTML = top3.map(r => `
    <div class="podium-item">
      <div class="medal">${medals[r.rank] || r.rank}</div>
      <div class="pname">${r.name}</div>
      <div class="pscore">${r.score}分</div>
    </div>
  `).join('');

  // 完整排名表（保持服务端顺序）
  const table = document.getElementById('resultTable');
  table.innerHTML = rankings.map((r, i) => {
    const isTop3 = r.rank >= 1 && r.rank <= 3;
    const cls = r.rank === 1 ? 'rt-gold' : r.rank === 2 ? 'rt-silver' : r.rank === 3 ? 'rt-bronze' : '';
    const me = r.name === myName ? ' rt-me' : '';
    const rankIcon = r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : r.rank === 3 ? '🥉' : (i+1);
    return `<div class="rt-row${me}">
      <span class="rt-rank ${cls}">${rankIcon}</span>
      <span class="rt-name">${r.name}</span>
      <span class="rt-score ${cls}">${r.score}分</span>
    </div>`;
  }).join('');
}

function showWonOverlay(rank) {
  document.getElementById('wonOverlay').classList.add('show');
  document.getElementById('wonRank').textContent = `第 ${rank} 名`;
  document.getElementById('wonScore').textContent = `${myScore} 分`;
  // 隐藏正常游戏UI
  document.getElementById('buzzerWrap').classList.remove('show');
  document.getElementById('questionCard').classList.remove('show');
  document.getElementById('buzzerResult').classList.remove('show');
  document.getElementById('submitAnsBtn').style.display = 'none';
  clearInterval(answerTimerInterval);
  clearTimeout(answerTimeout);
  isBuzzing = false;
  hasBuzzed = false;
}

// Enter 键登录
document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// 空格/Enter 抢答
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!hasBuzzed && document.getElementById('buzzerWrap').classList.contains('show')) {
      buzz();
    }
  }
});
</script>

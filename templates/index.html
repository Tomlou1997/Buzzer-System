<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 抢答系统 · 管理端</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;background:#0f0f1a;color:#fff;height:100vh;display:flex;overflow:hidden;}

/* 左侧导航 */
.sidebar{width:100px;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;padding:20px 0;border-right:1px solid #2a2a3e;gap:6px;}
.sidebar .logo{width:56px;height:56px;background:linear-gradient(135deg,#0078d4,#00bcd4);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:20px;}
.sidebar .nav-item{width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:32px;cursor:pointer;transition:.2s;color:#666;}
.sidebar .nav-item:hover{background:#2a2a3e;color:#fff;}
.sidebar .nav-item.active{background:linear-gradient(135deg,#0078d4,#005a9e);color:#fff;box-shadow:0 6px 16px rgba(0,120,212,0.4);}

/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.top-bar{height:60px;background:#1a1a2e;border-bottom:1px solid #2a2a3e;display:flex;align-items:center;padding:0 24px;gap:16px;}
.top-bar .title{font-size:20px;font-weight:700;background:linear-gradient(135deg,#0078d4,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.top-bar .status{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:14px;color:#aaa;}
.top-bar .status .dot{width:10px;height:10px;border-radius:50%;}
.top-bar .status .dot.green{background:#4CAF50;box-shadow:0 0 12px rgba(76,175,80,0.6);}
.top-bar .status .dot.red{background:#f44336;}

.content{flex:1;display:flex;padding:20px;gap:20px;min-height:0;overflow:hidden;}

/* 页面 */
.page{display:none;flex:1;flex-direction:column;gap:14px;min-height:0;overflow-y:auto;}
.page.active{display:flex;}
.page-title{font-size:18px;font-weight:700;color:#0078d4;padding-bottom:10px;border-bottom:1px solid #2a2a3e;}

/* 左侧选手面板 */
.players-panel{width:320px;min-width:320px;background:#1a1a2e;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:8px;}
.players-panel .panel-title{font-size:17px;font-weight:700;color:#0078d4;padding-bottom:8px;border-bottom:1px solid #2a2a3e;display:flex;justify-content:space-between;}
.players-panel .panel-title .count{color:#888;font-weight:400;font-size:15px;}
.player-card{background:#252538;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s;border:1px solid transparent;font-size:16px;}
.player-card:hover{border-color:#0078d4;background:#2a2a3e;}
.player-card .rb{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;}
.player-card .rb.gold{background:#FFD700;color:#1a1a2e;}
.player-card .rb.silver{background:#C0C0C0;color:#1a1a2e;}
.player-card .rb.bronze{background:#CD7F32;color:#fff;}
.player-card .name{flex:1;font-weight:500;}
.player-card .score{font-size:17px;font-weight:bold;}
.player-card .score.green{color:#4CAF50;}
.player-card .score.gray{color:#888;}
.player-card .rl{font-size:14px;color:#FFD700;}
.player-card .banned-badge{font-size:13px;color:#f44336;background:#3a1a1a;padding:2px 8px;border-radius:5px;}
.panel-actions{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:12px;border-top:1px solid #2a2a3e;}
.panel-actions .btn{padding:12px 16px;font-size:15px;}

/* 右侧 */
.right-area{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0;}
.info-bar{display:flex;gap:10px;}
.info-item{flex:1;background:#1a1a2e;border-radius:10px;padding:14px 16px;text-align:center;}
.info-item .lbl{font-size:13px;color:#888;margin-bottom:4px;}
.info-item .val{font-size:24px;font-weight:bold;}
.info-item .val.blue{color:#0078d4;}
.info-item .val.green{color:#4CAF50;}
.info-item .val.orange{color:#FF9800;}

.banner{padding:14px 20px;border-radius:10px;text-align:center;font-size:18px;font-weight:700;display:none;}

.q-card{flex:1;background:#1a1a2e;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:12px;min-height:0;}
.q-card .qt{font-size:15px;color:#0078d4;font-weight:700;}
.q-card .qtxt{flex:1;background:#1e1e2e;border-radius:8px;padding:16px 20px;font-size:18px;line-height:1.9;overflow-y:auto;min-height:80px;}
.q-card .qans{background:#252538;border-radius:8px;padding:10px 14px;font-size:14px;color:#4CAF50;font-weight:600;display:none;}
.q-card .qans.show{display:block;}
.q-card .qact{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.q-card .qact .timer-text{font-size:18px;font-weight:bold;color:#FF9800;padding:0 10px;}

/* 按钮 */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;}
.btn:active{transform:scale(.96);}
.btn-primary{background:#0078d4;color:#fff;}
.btn-primary:hover{background:#1a8ae8;}
.btn-success{background:#4CAF50;color:#fff;}
.btn-success:hover{background:#66BB6A;}
.btn-danger{background:#f44336;color:#fff;}
.btn-danger:hover{background:#ef5350;}
.btn-warning{background:#FF9800;color:#fff;}
.btn-warning:hover{background:#FFB74D;}
.btn-ghost{background:#2a2a3e;color:#ccc;}
.btn-ghost:hover{background:#333350;color:#fff;}
.btn-sm{padding:10px 22px;font-size:15px;}
.btn-block{width:100%;justify-content:center;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* 题库管理 */
.bank-list{display:flex;flex-direction:column;gap:6px;}
.bank-item{background:#252538;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;}
.bank-item .bname{flex:1;font-size:14px;}
.bank-item .bcount{color:#888;font-size:13px;}
.bank-item .bactive{color:#4CAF50;font-size:12px;}

.upload-zone{border:2px dashed #333;border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:.2s;}
.upload-zone:hover{border-color:#0078d4;background:#1e1e2e;}
.upload-zone .icon{font-size:42px;margin-bottom:8px;}
.upload-zone .text{font-size:15px;color:#888;}

/* 设置面板 */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:600px;}
.settings-grid .field{display:flex;flex-direction:column;gap:5px;}
.settings-grid .field label{font-size:14px;color:#888;}
.settings-grid .field input,.settings-grid .field select{background:#252538;border:1px solid #333;border-radius:8px;padding:10px 14px;color:#fff;font-size:15px;outline:none;}
.settings-grid .field input:focus{border-color:#0078d4;}
.settings-grid .field.checkbox{flex-direction:row;align-items:center;gap:10px;}

/* 选手右键菜单 */
.context-menu{display:none;position:fixed;background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:4px;z-index:1000;min-width:140px;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.context-menu .item{padding:7px 12px;font-size:12px;cursor:pointer;border-radius:4px;}
.context-menu .item:hover{background:#0078d4;color:#fff;}
.context-menu .item.danger:hover{background:#f44336;}
.context-menu.show{display:block;}

/* 日志区域 */
.log-box{background:#1a1a2e;border-radius:10px;padding:12px 16px;display:none;font-size:13px;color:#888;max-height:140px;overflow-y:auto;}
.log-box.show{display:block;}
.log-box .log-item{padding:3px 0;border-bottom:1px solid #1e1e2e;}
.log-box .log-item:last-child{border-bottom:none;}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:2000;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#1a1a2e;border-radius:16px;padding:28px;width:420px;box-shadow:0 24px 70px rgba(0,0,0,.6);}
.modal h3{font-size:18px;margin-bottom:16px;}
.modal .field{margin-bottom:14px;}
.modal .field label{display:block;font-size:14px;color:#888;margin-bottom:5px;}
.modal .field input{width:100%;padding:10px 14px;background:#252538;border:1px solid #333;border-radius:8px;color:#fff;font-size:15px;outline:none;}
.modal .field input:focus{border-color:#0078d4;}
.modal .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

/* 全屏积分榜 */
.scoreboard-full{background:#0f0f1a;width:90vw;max-width:800px;max-height:90vh;border-radius:20px;padding:32px;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.8);}
.scoreboard-full h2{color:#FFD700;margin:0;}
.scoreboard-full .sbf-row{display:flex;align-items:center;padding:14px 12px;border-bottom:1px solid #1a1a2e;font-size:20px;}
.scoreboard-full .sbf-rank{width:50px;text-align:center;font-size:26px;}
.scoreboard-full .sbf-name{flex:1;font-weight:600;}
.scoreboard-full .sbf-score{font-weight:700;font-size:24px;min-width:80px;text-align:right;}
.scoreboard-full .sbf-gold{color:#FFD700;}
.scoreboard-full .sbf-silver{color:#C0C0C0;}
.scoreboard-full .sbf-bronze{color:#CD7F32;}

/* 滚动条 */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#555;}
</style>
</head>
<body>

<!-- 左侧导航 -->
<div class="sidebar">
  <div class="logo">🎯</div>
  <div class="nav-item active" data-page="game" title="比赛控制">🎮</div>
  <div class="nav-item" data-page="bank" title="题库管理">📚</div>
  <div class="nav-item" data-page="settings" title="设置">⚙</div>
  <div class="nav-item" style="margin-top:auto;" id="toggleLog" title="日志">📋</div>
</div>

<!-- 主区域 -->
<div class="main">
  <div class="top-bar">
    <span class="title">🎯 抢答系统 · 管理端</span>
    <div class="status">
      <div class="dot green" id="serverDot"></div>
      <span id="serverStatus">运行中</span>
      <span style="margin-left:10px;color:#666;" id="playerCount">0 名选手</span>
    </div>
  </div>

  <div class="content">
    <!-- 选手面板（仅比赛页面） -->
    <div class="players-panel" id="playersPanel">
      <div class="panel-title">👥 选手 <span class="count" id="psCount">0</span></div>
      <div class="panel-hint" id="winHint" style="display:none;font-size:11px;color:#FF9800;text-align:center;padding:2px 0 6px;">🏆 获胜积分: <b>20</b></div>
      <button class="btn btn-primary btn-sm" style="width:100%;margin-bottom:6px;" onclick="openScoreboard()">🏆 积分榜</button>
      <div id="playerList"></div>
      <div class="panel-actions">
        <button class="btn btn-warning btn-block btn-sm" onclick="resetAllScores()" style="margin-bottom:4px;">🔄 重置积分</button>
        <button class="btn btn-warning btn-block btn-sm" id="restartBtn" style="display:none;" onclick="restartGame()">🔄 重赛</button>
        <button class="btn btn-danger btn-block btn-sm" id="endGameBtn" style="display:none;" onclick="endGame()">🏁 结束比赛</button>
      </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="right-area">

      <!-- 比赛页面 -->
      <div class="page active" id="pageGame">
        <div class="info-bar">
          <div class="info-item"><div class="lbl">📚 题库</div><div class="val blue" id="infoBank">--</div></div>
          <div class="info-item"><div class="lbl">📊 共几题</div><div class="val green" id="infoTotal">0</div></div>
          <div class="info-item"><div class="lbl">✅ 已答</div><div class="val blue" id="infoAnswered">0</div></div>
          <div class="info-item"><div class="lbl">⏳ 未答</div><div class="val orange" id="infoUnanswered">0</div></div>
          <div class="info-item"><div class="lbl">⏱ 倒计时</div><div class="val orange" id="infoTimer">--</div></div>
        </div>

        <div class="banner" id="banner"></div>

        <div class="q-card">
          <div class="qt" id="qType">📝 请先导入题库</div>
          <div class="qtxt" id="qText">点击左侧「📚 题库管理」上传 xlsx 题库文件</div>
          <div class="qans" id="qAnswer">✅ 参考答案: <span id="answerText"></span></div>
          <div class="qact">
            <button class="btn btn-ghost btn-sm" onclick="prevQuestion()">◀ 上一题</button>
            <button class="btn btn-ghost btn-sm" onclick="nextQuestion()">▶ 下一题</button>
            <button class="btn btn-primary btn-sm" id="startGameBtn" onclick="startGame()">🏁 开始比赛</button>
            <button class="btn btn-success btn-sm" id="startRoundBtn" onclick="startRound()" disabled>🚀 开始抢答</button>
            <span class="timer-text" id="timerDisplay"></span>
            <button class="btn btn-danger btn-sm" id="stopRoundBtn" onclick="stopRound()" disabled>■ 结束抢答</button>
            <div style="margin-left:auto;">
              <button class="btn btn-primary btn-sm" id="showAnswerBtn" onclick="toggleAnswer()">👁 显示答案</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 题库管理页面 -->
      <div class="page" id="pageBank">
        <div class="page-title">📚 题库管理</div>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="icon">📤</div>
          <div class="text">点击上传 .xlsx 题库文件</div>
          <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
        </div>
        <div class="bank-list" id="bankList"></div>
      </div>

      <!-- 设置页面 -->
      <div class="page" id="pageSettings">
        <div class="page-title" style="display:flex;justify-content:space-between;align-items:center;">
          <span>⚙ 设置</span>
          <span id="uptimeDisplay" style="font-size:14px;font-weight:400;color:#aaa;">⏱ 服务已运行: --:--:--</span>
        </div>
        <div class="settings-grid" style="max-width:500px;">
          <div class="field"><label>答对得分</label><input type="number" id="sCorrect" value="2"></div>
          <div class="field"><label>答错扣分</label><input type="number" id="sWrong" value="1"></div>
          <div class="field"><label>答题倒计时(秒)</label><input type="number" id="sTimeout" value="15"></div>
          <div class="field"><label>抢答等待秒数</label><input type="number" id="sBuzzTimeout" value="15"></div>
          <div class="field"><label>获胜积分</label><input type="number" id="sWinScore" value="20"></div>
          <div class="field"><label>决出前几名</label><input type="number" id="sWinRank" value="3"></div>
          <div class="field"><label>啦啦队次数</label><input type="number" id="sExtend" value="1"></div>
          <div class="field"><label>啦啦队增加秒数</label><input type="number" id="sExtendSec" value="15"></div>
          <div class="field checkbox"><input type="checkbox" id="sRepeat"><label>题目可重复使用</label></div>
          <div class="field checkbox"><input type="checkbox" id="sShowAns"><label>显示参考答案</label></div>
          <div class="field checkbox"><input type="checkbox" id="sRestartBtn" checked><label>显示重赛按钮</label></div>
          <div class="field checkbox"><input type="checkbox" id="sEndBtn" checked><label>显示结束比赛按钮</label></div>
        </div>
        <div style="margin-top:12px;"><button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button></div>
        <div style="margin-top:12px;"><button class="btn btn-danger" onclick="restartServer()" style="width:100%;">🔄 重启服务</button></div>
        <div style="margin-top:12px;"><button class="btn btn-danger" onclick="stopServer()" style="width:100%;">⏹ 关闭服务</button></div>
      </div>

      <!-- 日志 -->
      <div class="log-box" id="logBox">
        <div style="font-weight:600;margin-bottom:4px;">📋 日志</div>
        <div id="logContent"></div>
      </div>
    </div>
  </div>
</div>

<!-- 右键菜单 -->
<div class="context-menu" id="ctxMenu">
  <div class="item" onclick="ctxAction('ban')">🚫 禁赛</div>
  <div class="item" onclick="ctxAction('unban')">🟢 恢复参赛</div>
  <div class="item" onclick="ctxAction('penalty')">⚠️ 违规扣5分</div>
  <div class="item" onclick="ctxAction('setScore')">📝 设置分数</div>
  <div class="item" onclick="ctxAction('remove')">🗑 移除选手</div>
</div>

<!-- 分数设置弹窗 -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal">
    <h3>📝 设置分数</h3>
    <div class="field"><label>选手</label><input id="scoreName" disabled></div>
    <div class="field"><label>分数</label><input type="number" id="scoreInput" value="0"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeScoreModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="confirmSetScore()">确定</button>
    </div>
  </div>
</div>

<!-- 全屏积分榜 -->
<div class="modal-overlay" id="scoreboardOverlay" onclick="closeScoreboard()">
  <div class="scoreboard-full" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:28px;">🏆 积分榜</h2>
      <button class="btn btn-ghost btn-sm" onclick="closeScoreboard()" style="font-size:18px;">✕ 关闭</button>
    </div>
    <div id="scoreboardFullContent"></div>
  </div>
</div>

<script>
let ws = null;
let adminState = null;
let ctxPlayer = '';
let logLines = [];

function connect() {
  // 使用当前页面 host 连接 WebSocket
  window._stopReconnect = false;
  ws = new WebSocket(`ws://${location.host}/ws/admin`);

  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    if (msg.type === 'admin_state') {
      window._stopReconnect = false;
      adminState = msg;
      if (msg.uptime) {
        serverUptime = msg.uptime;
        const el = document.getElementById('uptimeDisplay');
        if (el) el.textContent = `⏱ 服务已运行: ${formatUptime(serverUptime)}`;
      }
      render();
    } else if (msg.type === 'error') {
      addLog('⚠️ ' + msg.msg);
      // 显示在横幅上
      const banner = document.getElementById('banner');
      banner.style.display = 'block';
      banner.style.background = '#4a1a1a';
      banner.style.color = '#f44336';
      banner.textContent = '⚠️ ' + msg.msg;
      banner.dataset.locked = '0';
      // 管理端已满，不重连
      if (msg.msg && msg.msg.includes('已有管理端')) {
        window._stopReconnect = true;
      }
    } else if (msg.type === 'answer_received') {
      const icon = msg.is_correct ? '✅' : '❌';
      const pts = msg.points || 0;
      const ptsText = pts > 0 ? `+${pts}分` : pts < 0 ? `${pts}分` : '';
      const isTimeout = msg.answer && msg.answer.includes('超时');
      // 在横幅区显示答题记录，并标记不被覆盖
      const banner = document.getElementById('banner');
      banner.style.display = 'block';
      banner.style.background = msg.is_correct ? 'linear-gradient(135deg,#1a4a1a,#2a6a2a)' : 'linear-gradient(135deg,#4a1a1a,#6a2a2a)';
      banner.style.color = msg.is_correct ? '#4CAF50' : '#f44336';
      if (isTimeout) {
        banner.innerHTML = `⏰ <b>${msg.name}</b> ${msg.answer} ${ptsText} | 正确答案: <b>${msg.correct}</b>`;
      } else {
        banner.innerHTML = `${icon} <b>${msg.name}</b> 答案: ${msg.answer} | 正确答案: <b>${msg.correct}</b> ${ptsText ? '(' + ptsText + ')' : ''}`;
      }
      banner.dataset.locked = '1';
      addLog(`${icon} ${msg.name} 答案: ${msg.answer} | 正确答案: ${msg.correct} ${ptsText}`);
      window._lastCheer = null;  // 答题结束，清除啦啦队状态
    } else if (msg.type === 'cheer_used') {
      addLog(`📣 [${msg.name}] 使用了啦啦队 +${msg.added}秒，剩余 ${msg.remaining}秒`);
      window._lastCheer = {name: msg.name, added: msg.added};
      window._lastCheer = {name: msg.name, added: msg.added};
    } else if (msg.type === 'player_joined') {
      addLog(`✅ 选手 [${msg.name}] 加入`);
    } else if (msg.type === 'player_left') {
      addLog(`❌ 选手 [${msg.name}] 离开`);
    }
  };

  ws.onclose = function() {
    document.getElementById('serverDot').className = 'dot red';
    document.getElementById('serverStatus').textContent = '已断开';
    if (!window._stopReconnect) {
      setTimeout(connect, 2000);
    }
  };
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function addLog(text) {
  const ts = new Date().toLocaleTimeString();
  logLines.unshift(`[${ts}] ${text}`);
  const el = document.getElementById('logContent');
  el.innerHTML = logLines.map(l => `<div class="log-item">${l}</div>`).join('');
}

// ========== 运行时间 ==========
let serverUptime = 0;
function formatUptime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(() => {
  serverUptime++;
  const el = document.getElementById('uptimeDisplay');
  if (el) el.textContent = `⏱ 服务已运行: ${formatUptime(serverUptime)}`;
}, 1000);

// ========== 渲染 ==========
function render() {
  const s = adminState;
  if (!s) return;

  // 选手列表
  renderPlayers(s.players, s.ranked_players);

  // 获胜积分提示
  const winHint = document.getElementById('winHint');
  if (s.game_started && !s.game_over && s.settings) {
    winHint.style.display = 'block';
    winHint.innerHTML = `🏆 获胜积分: <b>${s.settings.win_score}</b>`;
  } else {
    winHint.style.display = 'none';
  }

  // 信息栏
  const connected = Object.values(s.players).filter(p => p.connected).length;
  document.getElementById('playerCount').textContent = connected + ' 名选手';
  document.getElementById('psCount').textContent = connected;
  document.getElementById('infoBank').textContent = s.active_bank_name || '--';
  document.getElementById('infoTotal').textContent = s.total_questions;
  document.getElementById('infoAnswered').textContent = s.used_count;
  document.getElementById('infoUnanswered').textContent = s.total_questions - s.used_count;

  if (s.timer_remaining > 0) {
    document.getElementById('infoTimer').textContent = s.timer_remaining + 's';
  } else {
    document.getElementById('infoTimer').textContent = '--';
  }

  // 题目
  if (s.current_question) {
    const q = s.current_question;
    document.getElementById('qType').textContent = '📝 ' + (q.type || '题目');
    document.getElementById('qText').innerHTML = q.question + (q.options && q.options.length ? '<br><br>' + q.options.join('<br>') : '');
    document.getElementById('answerText').textContent = q.answer;
  }

  // 显示答案按钮（由设置控制是否可见）
  const sShowAnsChecked = document.getElementById('sShowAns')?.checked ?? false;
  const showAnsBtn = document.getElementById('showAnswerBtn');
  showAnsBtn.style.display = sShowAnsChecked ? 'inline-block' : 'none';

  // 显示答案（仅在初始时应用设置，之后由用户手动切换）
  if (!window._ansInitDone) {
    document.getElementById('qAnswer').style.display = sShowAnsChecked ? 'block' : 'none';
    window._ansInitDone = true;
  }

  // 横幅（如果显示了答题记录则保留，不覆盖）
  const banner = document.getElementById('banner');
  if (banner.dataset.locked === '1') {
    // 题目变化时才解锁（切换到下一题了）
    if (typeof window._lastQuestionIdx === 'undefined') window._lastQuestionIdx = -1;
    if (s.current_question_index !== window._lastQuestionIdx) {
      banner.dataset.locked = '0';
    }
  }
  window._lastQuestionIdx = s.current_question_index;
  if (banner.dataset.locked !== '1') {
    const cheer = window._lastCheer;
    if (s.round_active) {
      if (s.first_buzzer) {
        banner.style.display = 'block';
        banner.style.background = cheer ? 'linear-gradient(135deg,#FF9800,#9C27B0)' : 'linear-gradient(135deg,#4CAF50,#66BB6A)';
        banner.textContent = cheer 
          ? `📣 [${s.first_buzzer}] 使用啦啦队 +${cheer.added}秒 ⏱ 剩余 ${s.timer_remaining}s`
          : `🎉🎉🎉 [${s.first_buzzer}] 抢答成功！等待输入答案 ⏱ ${s.timer_remaining}s 🎉🎉🎉`;
      } else {
        banner.style.display = 'block';
        banner.style.background = 'linear-gradient(135deg,#FF9800,#FFB74D)';
        banner.textContent = `🟢 第 ${s.round_num} 轮抢答进行中...`;
      }
    } else if (s.game_started && !s.game_over) {
      banner.style.display = 'block';
      banner.style.background = '#2a2a3e';
      banner.style.color = '#888';
      banner.textContent = '⏳ 等待开始抢答';
    } else if (s.game_over) {
      banner.style.display = 'block';
      banner.style.background = 'linear-gradient(135deg,#9C27B0,#7B1FA2)';
      banner.textContent = '🏁 比赛已结束';
      // 自动弹出全屏积分榜
      if (!window._scoreboardShown) {
        window._scoreboardShown = true;
        openScoreboard();
      }
    } else {
      window._scoreboardShown = false;
      banner.style.display = 'none';
    }
  }

  // 按钮状态
  const startGameBtn = document.getElementById('startGameBtn');
  const startBtn = document.getElementById('startRoundBtn');
  const stopBtn = document.getElementById('stopRoundBtn');
  const timerDisp = document.getElementById('timerDisplay');

  if (!s.game_started) {
    // 比赛未开始
    startGameBtn.disabled = false;
    startGameBtn.textContent = '🏁 开始比赛';
    startBtn.disabled = true;
    stopBtn.disabled = true;
    timerDisp.textContent = '';
  } else if (s.game_over) {
    startGameBtn.disabled = true;
    startGameBtn.textContent = '🏁 已结束';
    startBtn.disabled = true;
    stopBtn.disabled = true;
    timerDisp.textContent = '';
  } else if (s.round_active) {
    startGameBtn.disabled = true;
    startGameBtn.textContent = '🏁 比赛中';
    startBtn.disabled = true;
    stopBtn.disabled = false;
    timerDisp.textContent = s.first_buzzer ? `⏱ ${s.timer_remaining}s` : '';
  } else {
    // 已开始比赛，等待抢答
    startGameBtn.disabled = true;
    startGameBtn.textContent = '🏁 进行中';
    startBtn.disabled = !s.total_questions;
    stopBtn.disabled = true;
    timerDisp.textContent = '';
  }

  // 管理按钮（分开控制）
  const showRestart = document.getElementById('sRestartBtn').checked;
  const showEnd = document.getElementById('sEndBtn').checked;
  document.getElementById('restartBtn').style.display = showRestart && s.game_started ? 'block' : 'none';
  document.getElementById('endGameBtn').style.display = showEnd && s.game_started ? 'block' : 'none';

  // 设置值同步
  if (s.settings) {
    document.getElementById('sCorrect').value = s.settings.correct_points;
    document.getElementById('sWrong').value = s.settings.wrong_points;
    document.getElementById('sTimeout').value = s.settings.answer_timeout;
    document.getElementById('sWinScore').value = s.settings.win_score;
    document.getElementById('sWinRank').value = s.settings.win_rank_count;
    document.getElementById('sExtend').value = s.settings.extend_max;
    document.getElementById('sExtendSec').value = s.settings.extend_seconds;
    document.getElementById('sRepeat').checked = s.settings.allow_repeat;
    document.getElementById('sRestartBtn').checked = s.settings.show_restart_btn;
    document.getElementById('sEndBtn').checked = s.settings.show_end_btn;
  }

  // 题库列表
  renderBanks(s.question_banks, s.active_bank_name);
}

function renderPlayers(players, ranked) {
  const el = document.getElementById('playerList');

  // 只显示已连接的选手
  const names = Object.keys(players).filter(n => players[n].connected);
  if (!names.length) {
    el.innerHTML = '<div style="color:#666;font-size:12px;padding:8px;text-align:center;">暂无选手连接</div>';
    return;
  }

  // 构建排名映射
  const rankMap = {};
  for (const r of ranked) {
    rankMap[r.name] = r;
  }

  // 排序：已排名按名次，其余按分数
  const sorted = names.sort((a, b) => {
    const ra = rankMap[a] ? rankMap[a].rank : 999;
    const rb = rankMap[b] ? rankMap[b].rank : 999;
    if (ra !== rb) return ra - rb;
    return (players[b].score || 0) - (players[a].score || 0);
  });

  const rankTitles = {1:'🥇',2:'🥈',3:'🥉'};
  const rankColors = {1:'gold',2:'silver',3:'bronze'};

  el.innerHTML = sorted.map(name => {
    const p = players[name];
    const r = rankMap[name];
    const rb = r ? `<div class="rb ${rankColors[r.rank]||''}">${rankTitles[r.rank]||r.rank}</div>` : '';
    const rl = r ? `<span class="rl">第${r.rank}名</span>` : '';
    const banned = p.banned ? '<span class="banned-badge">🚫</span>' : '';
    return `<div class="player-card" oncontextmenu="showCtxMenu(event,'${name}')">
      ${rb}
      <span class="name">${name}</span>
      <span class="score ${r?'green':'gray'}">${p.score}分</span>
      ${rl}${banned}
    </div>`;
  }).join('');
}

function renderBanks(banks, active) {
  const el = document.getElementById('bankList');
  if (!banks || !banks.length) {
    el.innerHTML = '<div style="color:#666;font-size:12px;text-align:center;padding:20px;">暂无题库，请上传 xlsx 文件</div>';
    return;
  }
  el.innerHTML = banks.map(name => {
    const count = adminState?.total_questions || '?';
    return `<div class="bank-item">
      <span class="bname">${name}</span>
      <span class="bcount">${count}题</span>
      ${name === active ? '<span class="bactive">✅ 使用中</span>' : `<button class="btn btn-sm btn-primary" onclick="activateBank('${name}')">使用</button>`}
      <button class="btn btn-sm btn-ghost" onclick="deleteBank('${name}')">🗑</button>
    </div>`;
  }).join('');
}

// ========== 操作 ==========
function prevQuestion() { send({type: 'prev_question'}); }
function nextQuestion() { send({type: 'next_question'}); }

function startGame() {
  send({type: 'start_game'});
  addLog('🏁 开始比赛');
}

function startRound() {
  send({type: 'start_round'});
  addLog('🚀 开始抢答');
}

function stopRound() {
  send({type: 'stop_round'});
  addLog('🔴 结束抢答');
}

function toggleAnswer() {
  const el = document.getElementById('qAnswer');
  const btn = document.getElementById('showAnswerBtn');
  if (el.style.display === 'block') {
    el.style.display = 'none';
    btn.textContent = '👁 显示答案';
  } else {
    el.style.display = 'block';
    btn.textContent = '🙈 隐藏答案';
  }
}

function restartGame() {
  if (confirm('确定要重赛吗？所有分数将被重置')) {
    send({type: 'restart_game'});
    addLog('🔄 重赛');
  }
}

function endGame() {
  if (confirm('确定要结束比赛吗？')) {
    send({type: 'end_game'});
    addLog('🏁 结束比赛');
  }
}

// ========== 重置积分 ==========
function resetAllScores() {
  if (confirm('确定要把所有选手积分重置为零吗？')) {
    send({type: 'reset_all_scores'});
    addLog('🔄 所有选手积分已重置为零');
  }
}

// ========== 题库 ==========
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const form = new FormData();
  form.append('file', file);
  fetch('/api/upload', {method:'POST', body:form})
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        addLog('❌ ' + data.error);
        alert(data.error);
      } else {
        addLog(`✅ 导入题库: ${data.name} (${data.count}题)`);
      }
    })
    .catch(err => addLog('❌ 上传失败: ' + err));
});

function activateBank(name) {
  send({type: 'activate_bank', name});
  addLog(`📚 切换到题库: ${name}`);
}

function deleteBank(name) {
  if (confirm(`确定删除题库「${name}」？`)) {
    send({type: 'delete_bank', name});
    addLog(`🗑 删除题库: ${name}`);
  }
}

// ========== 选手右键菜单 ==========
function showCtxMenu(e, name) {
  e.preventDefault();
  ctxPlayer = name;
  const menu = document.getElementById('ctxMenu');
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  menu.classList.add('show');
}

document.addEventListener('click', function() {
  document.getElementById('ctxMenu').classList.remove('show');
});

function ctxAction(action) {
  document.getElementById('ctxMenu').classList.remove('show');
  if (!ctxPlayer) return;

  if (action === 'ban' || action === 'unban') {
    send({type: 'toggle_ban', name: ctxPlayer});
    addLog(`🚫 ${action === 'ban' ? '禁赛' : '恢复'} [${ctxPlayer}]`);
  } else if (action === 'penalty') {
    send({type: 'penalty', name: ctxPlayer, points: 5});
    addLog(`⚠️ [${ctxPlayer}] 违规扣5分`);
  } else if (action === 'setScore') {
    document.getElementById('scoreName').value = ctxPlayer;
    document.getElementById('scoreInput').value = adminState?.players?.[ctxPlayer]?.score || 0;
    document.getElementById('scoreModal').classList.add('show');
  } else if (action === 'remove') {
    if (confirm(`确定要移除选手 [${ctxPlayer}] 吗？`)) {
      send({type: 'remove_player', name: ctxPlayer});
    }
  }
}

function closeScoreModal() {
  document.getElementById('scoreModal').classList.remove('show');
}

function confirmSetScore() {
  const val = parseInt(document.getElementById('scoreInput').value);
  if (isNaN(val)) return;
  send({type: 'set_score', name: ctxPlayer, score: val});
  addLog(`📝 [${ctxPlayer}] 分数设为 ${val}`);
  closeScoreModal();
}

// ========== 全屏积分榜 ==========
function openScoreboard() {
  document.getElementById('scoreboardOverlay').classList.add('show');
  refreshScoreboardFull();
}

function closeScoreboard() {
  document.getElementById('scoreboardOverlay').classList.remove('show');
}

function refreshScoreboardFull() {
  const s = adminState;
  if (!s) return;
  const players = s.players || {};
  const ranked = s.ranked_players || [];

  const rankMap = {};
  for (const r of ranked) rankMap[r.name] = r;

  const names = Object.keys(players).filter(n => players[n].connected).sort((a, b) => {
    const ra = rankMap[a] ? rankMap[a].rank : 999;
    const rb = rankMap[b] ? rankMap[b].rank : 999;
    if (ra !== rb) return ra - rb;
    return (players[b].score || 0) - (players[a].score || 0);
  });

  const el = document.getElementById('scoreboardFullContent');
  if (!names.length) {
    el.innerHTML = '<div style="text-align:center;color:#666;padding:60px;font-size:24px;">暂无选手</div>';
    return;
  }

  el.innerHTML = names.map((name, i) => {
    const p = players[name];
    const cls = i === 0 ? 'sbf-gold' : i === 1 ? 'sbf-silver' : i === 2 ? 'sbf-bronze' : '';
    const icon = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    const conn = p.connected ? '' : ' ⚫';
    return `<div class="sbf-row">
      <span class="sbf-rank ${cls}">${icon}</span>
      <span class="sbf-name">${name}${conn}</span>
      <span class="sbf-score ${cls}">${p.score}分</span>
    </div>`;
  }).join('');
}

// 打开时每秒刷新
setInterval(() => {
  if (document.getElementById('scoreboardOverlay')?.classList.contains('show')) {
    refreshScoreboardFull();
  }
}, 1000);

// ========== 设置 ==========
function saveSettings() {
  send({
    type: 'update_settings',
    settings: {
      correct_points: parseInt(document.getElementById('sCorrect').value) || 10,
      wrong_points: parseInt(document.getElementById('sWrong').value) || 5,
      answer_timeout: parseInt(document.getElementById('sTimeout').value) || 15,
      buzz_timeout: parseInt(document.getElementById('sBuzzTimeout').value) || 15,
      win_score: parseInt(document.getElementById('sWinScore').value) || 20,
      win_rank_count: parseInt(document.getElementById('sWinRank').value) || 3,
      allow_repeat: document.getElementById('sRepeat').checked,
      extend_max: parseInt(document.getElementById('sExtend').value) || 1,
      extend_seconds: parseInt(document.getElementById('sExtendSec').value) || 15,
      show_restart_btn: document.getElementById('sRestartBtn').checked,
      show_end_btn: document.getElementById('sEndBtn').checked,
    }
  });
  addLog('⚙ 设置已保存');
}

// ========== 重启服务 ==========
function restartServer() {
  if (!confirm('确定要重启服务吗？正在进行的比赛会被中断。')) return;
  fetch('/api/restart', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      addLog('🔄 ' + (data.msg || '服务重启中...'));
      if (ws) ws.close();
    })
    .catch(err => addLog('❌ 重启失败: ' + err));
}

// ========== 关闭服务 ==========
function stopServer() {
  if (!confirm('确定要关闭服务吗？所有连接会立即断开。')) return;
  fetch('/api/stop', { method: 'POST' })
    .then(r => r.json())
    .then(data => {
      addLog('⏹ ' + (data.msg || '服务已关闭'));
      if (ws) ws.close();
    })
    .catch(err => addLog('❌ 关闭失败: ' + err));
}

// ========== 页面切换 ==========
document.querySelectorAll('.nav-item[data-page]').forEach(item => {
  item.addEventListener('click', function() {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
    const pageId = 'page' + this.dataset.page.charAt(0).toUpperCase() + this.dataset.page.slice(1);
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');

    // 只有比赛页面显示选手面板
    document.getElementById('playersPanel').style.display = (pageId === 'pageGame') ? 'flex' : 'none';
  });
});

document.getElementById('toggleLog').addEventListener('click', function() {
  const el = document.getElementById('logBox');
  el.classList.toggle('show');
});

function showSettingsPage() {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('[data-page="settings"]').classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pageSettings').classList.add('active');
  document.getElementById('playersPanel').style.display = 'none';
}

// 启动连接
connect();
addLog('🟢 管理端已启动');
// 默认显示选手面板
document.getElementById('playersPanel').style.display = 'flex';

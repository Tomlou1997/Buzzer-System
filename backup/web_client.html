<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎯 抢答系统 · 选手端</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    color: #fff; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 20px;
  }

  /* ======== 连接页 ======== */
  .page { display: none; width: 100%; max-width: 420px; }
  .page.active { display: block; }

  .connect-box {
    background: #1a1a2e; border-radius: 16px; padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }
  .connect-box .logo {
    font-size: 48px; margin-bottom: 10px;
  }
  .connect-box h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .connect-box .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
  .connect-box .input-group {
    background: #252538; border-radius: 10px; padding: 3px;
    display: flex; border: 1px solid #333; margin-bottom: 12px;
  }
  .connect-box .input-group input {
    flex: 1; background: transparent; border: none; padding: 10px 14px;
    color: #fff; font-size: 16px; outline: none;
  }
  .connect-box .input-group input::placeholder { color: #555; }
  .connect-box .input-group .port-label {
    display: flex; align-items: center; padding: 0 12px;
    color: #888; font-size: 13px; background: #1a1a2e;
    border-radius: 0 8px 8px 0;
  }
  .error-text { color: #f44336; font-size: 12px; min-height: 20px; margin-bottom: 8px; }

  /* ======== 等待页 ======== */
  .waiting-box {
    background: #1a1a2e; border-radius: 16px; padding: 40px 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    text-align: center;
  }
  .waiting-box .pulsar {
    font-size: 64px; animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  .waiting-box h2 { font-size: 18px; margin: 12px 0 8px; }
  .waiting-box p { color: #888; font-size: 13px; line-height: 1.6; }
  .waiting-box .player-name-tag {
    display: inline-block; background: #0078d4; padding: 4px 16px;
    border-radius: 20px; font-size: 14px; font-weight: 600;
    margin-top: 10px;
  }

  /* ======== 抢答页 ======== */
  .game-box {
    background: #1a1a2e; border-radius: 16px; padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    width: 100%; max-width: 420px;
  }
  .game-box .round-info {
    text-align: center; margin-bottom: 16px;
  }
  .game-box .round-info .rlabel { color: #888; font-size: 11px; }
  .game-box .round-info .rnum { font-size: 28px; font-weight: 700; color: #0078d4; }
  .game-box .timer-ring {
    width: 120px; height: 120px; margin: 0 auto 16px;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .game-box .timer-ring svg { position: absolute; transform: rotate(-90deg); }
  .game-box .timer-ring .timer-text {
    font-size: 36px; font-weight: bold; color: #fff;
    z-index: 1;
  }
  .game-box .question-text {
    background: #1e1e2e; border-radius: 10px; padding: 16px;
    font-size: 15px; line-height: 1.8; margin-bottom: 16px;
    min-height: 60px;
  }
  .game-box .question-type { color: #FF9800; font-size: 11px; font-weight: 600; margin-bottom: 4px; }

  /* ======== 按钮 ======== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 12px 24px; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.15s; width: 100%;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .btn-primary { background: #0078d4; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1a8ae8; }
  .btn-success { background: #4CAF50; color: #fff; }
  .btn-success:hover:not(:disabled) { background: #66BB6A; }
  .btn-danger { background: #f44336; color: #fff; }
  .btn-danger:hover:not(:disabled) { background: #ef5350; }
  .btn-ghost { background: #252538; color: #ccc; }
  .btn-ghost:hover:not(:disabled) { background: #333350; color: #fff; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }

  .buzzer-btn {
    width: 180px; height: 180px; border-radius: 50%;
    border: none; font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #0078d4, #005a9e);
    color: #fff; cursor: pointer; transition: all 0.15s;
    margin: 16px auto; display: block; box-shadow: 0 8px 32px rgba(0,120,212,0.4);
    position: relative; overflow: hidden;
  }
  .buzzer-btn::after {
    content: ''; position: absolute; top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
  }
  .buzzer-btn:active { transform: scale(0.92); }
  .buzzer-btn:disabled {
    opacity: 0.3; cursor: not-allowed; transform: none;
    box-shadow: none;
  }
  .buzzer-btn.buzzed {
    background: linear-gradient(135deg, #4CAF50, #388E3C);
    box-shadow: 0 0 60px rgba(76,175,80,0.6);
    animation: glow 1.5s ease-in-out infinite;
  }
  @keyframes glow { 0%,100%{box-shadow:0 0 40px rgba(76,175,80,0.4)} 50%{box-shadow:0 0 80px rgba(76,175,80,0.8)} }
  .buzzer-btn.waiting-buzz {
    background: linear-gradient(135deg, #FF9800, #F57C00);
    box-shadow: 0 0 40px rgba(255,152,0,0.4);
    animation: buzz-pulse 0.5s ease-in-out infinite;
  }
  @keyframes buzz-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  /* ======== 答案输入区 ======== */
  .answer-area { text-align: center; margin-top: 12px; }
  .answer-area .input-group { display: flex; gap: 8px; margin-bottom: 8px; }
  .answer-area input {
    flex: 1; background: #252538; border: 1px solid #333;
    border-radius: 8px; padding: 10px 14px; color: #fff;
    font-size: 16px; outline: none;
  }
  .answer-area input:focus { border-color: #0078d4; }
  .answer-area .help-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }

  /* ======== 结果页 ======== */
  .result-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    z-index: 999; align-items: center; justify-content: center;
  }
  .result-overlay.show { display: flex; }
  .result-box {
    background: #1a1a2e; border-radius: 20px; padding: 30px;
    width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .result-box .icon { font-size: 48px; margin-bottom: 12px; }
  .result-box h2 { font-size: 20px; margin-bottom: 8px; }
  .result-box .score-change { font-size: 36px; font-weight: 800; margin: 8px 0; }
  .result-box .score-change.correct { color: #4CAF50; }
  .result-box .score-change.wrong { color: #f44336; }
  .result-box .score-change.timeout { color: #FF9800; }
  .result-box .total-score { color: #888; font-size: 14px; margin-bottom: 16px; }

  .rankings-box {
    background: #1a1a2e; border-radius: 20px; padding: 24px;
    width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .rankings-box h2 { text-align: center; font-size: 18px; margin-bottom: 12px; }
  .rankings-box table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .rankings-box th { color: #888; text-align: left; padding: 6px 8px; border-bottom: 1px solid #333; }
  .rankings-box td { padding: 6px 8px; border-bottom: 1px solid #252525; }
  .rankings-box .rn { font-weight: bold; width: 30px; }
  .rankings-box .rn.gold { color: #FFD700; }
  .rankings-box .rn.silver { color: #C0C0C0; }
  .rankings-box .rn.bronze { color: #CD7F32; }

  .waiting-status {
    color: #888; font-size: 12px; margin-top: 8px; text-align: center;
  }

  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 9999; padding: 10px 20px; border-radius: 8px; font-size: 14px;
    opacity: 0; transition: opacity 0.3s; max-width: 90%;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #4CAF50; color: #fff; }
  .toast.error { background: #f44336; color: #fff; }
  .toast.info { background: #0078d4; color: #fff; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
</style>
</head>
<body>

<!-- 连接页 -->
<div class="page active" id="pageConnect">
  <div class="connect-box">
    <div class="logo">🎯</div>
    <h1>抢答系统</h1>
    <div class="subtitle">输入选手名称加入</div>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="你的名称" maxlength="10" autocomplete="off">
    </div>
    <div class="input-group">
      <input type="text" id="ipInput" placeholder="服务器地址" value="10.8.51.7">
      <span class="port-label">:8888</span>
    </div>
    <div class="error-text" id="connectError"></div>
    <button class="btn btn-primary" onclick="connect()" id="connectBtn">🔗 加入比赛</button>
  </div>
</div>

<!-- 等待页 -->
<div class="page" id="pageWait">
  <div class="waiting-box">
    <div class="pulsar">🕐</div>
    <h2>等待比赛开始...</h2>
    <p>已成功加入，请等待主持人开始比赛。</p>
    <div class="player-name-tag" id="waitName">选手</div>
    <p style="margin-top:16px;font-size:12px;color:#555;" id="waitPlayerCount">选手列表加载中...</p>
  </div>
</div>

<!-- 抢答页 -->
<div class="page" id="pageGame">
  <div class="game-box">
    <div class="round-info">
      <div class="rlabel">第 <span id="gameRound">0</span> 轮</div>
    </div>

    <!-- 倒计时圆环 -->
    <div class="timer-ring" id="timerRing">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#252538" stroke-width="6"/>
        <circle id="timerCircle" cx="60" cy="60" r="50" fill="none" stroke="#0078d4" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="314.16" stroke-dashoffset="0"
          style="transition: stroke-dashoffset 0.3s ease;"/>
      </svg>
      <span class="timer-text" id="timerText">-</span>
    </div>

    <div class="question-type" id="gameQType">📝 题目</div>
    <div class="question-text" id="gameQText">等待题目...</div>

    <!-- 抢答按钮 -->
    <button class="buzzer-btn" id="buzzerBtn" onclick="buzz()" disabled>🔔<br><span style="font-size:12px;font-weight:400;">抢答</span></button>

    <!-- 答案输入区 -->
    <div class="answer-area" id="answerArea" style="display:none;">
      <div class="input-group">
        <input type="text" id="answerInput" placeholder="输入你的答案..." onkeydown="if(event.key==='Enter')submitAnswer()">
        <button class="btn btn-success btn-sm" onclick="submitAnswer()" id="submitBtn">✅ 提交</button>
      </div>
      <div class="help-row">
        <button class="btn btn-ghost btn-sm" onclick="askHelp()" id="helpBtn">🙋 求助啦啦队</button>
      </div>
    </div>

    <div class="waiting-status" id="gameStatus">等待抢答开始...</div>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="result-overlay" id="resultOverlay">
  <div id="resultContent"></div>
</div>

<!-- Toast -->
<div class="toast" id="clientToast"></div>

<script>
let ws = null;
let playerName = "";
let serverIp = "10.8.51.7";
let serverPort = 8888;
let myState = { buzzed: false, answering: false, waitingAnswer: false };
let heartbeatInterval = null;
let currentSession = null;

// ========== 连接 ==========
function connect() {
  const name = document.getElementById("nameInput").value.trim();
  const ip = document.getElementById("ipInput").value.trim();
  const err = document.getElementById("connectError");

  if (!name) { err.textContent = "请输入选手名称"; return; }
  if (!ip) { err.textContent = "请输入服务器地址"; return; }

  playerName = name;
  serverIp = ip;
  err.textContent = "";
  document.getElementById("connectBtn").disabled = true;
  document.getElementById("connectBtn").textContent = "⏳ 连接中...";

  // WebSocket 连接
  const url = `ws://${serverIp}:${serverPort}/ws/client`;
  if (ws) { ws.close(); ws = null; }

  ws = new WebSocket(url);
  ws.onopen = function() {
    wsSend({type: "join", name: playerName});
  };
  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
  ws.onerror = function() {
    err.textContent = "❌ 连接失败，请检查服务器地址和端口";
    document.getElementById("connectBtn").disabled = false;
    document.getElementById("connectBtn").textContent = "🔗 加入比赛";
  };
  ws.onclose = function() {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    // 如果不是故意关闭，回到连接页
    if (document.getElementById("pageConnect").classList.contains("active")) return;
    // 如果已经加入了，重连
    setTimeout(() => {
      if (ws && ws.readyState > 1) connect();
    }, 3000);
  };
}

function wsSend(data) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(data));
}

// ========== 消息处理 ==========
function handleMessage(msg) {
  const err = document.getElementById("connectError");

  switch (msg.type) {
    case "join_ok":
      // 加入成功
      showPage("pageWait");
      document.getElementById("waitName").textContent = playerName;
      break;

    case "join_fail":
    case "error":
      err.textContent = "❌ " + (msg.message || "加入失败");
      document.getElementById("connectBtn").disabled = false;
      document.getElementById("connectBtn").textContent = "🔗 加入比赛";
      if (ws) { ws.close(); ws = null; }
      break;

    case "game_start":
      showPage("pageGame");
      myState.buzzed = false;
      myState.answering = false;
      myState.waitingAnswer = false;
      if (msg.round_num) document.getElementById("gameRound").textContent = msg.round_num;
      document.getElementById("gameStatus").textContent = "⏳ 准备中...";
      resetTimer();
      document.getElementById("buzzerBtn").disabled = true;
      document.getElementById("buzzerBtn").className = "buzzer-btn";
      document.getElementById("answerArea").style.display = "none";
      break;

    case "round_start":
      myState.buzzed = false;
      myState.answering = false;
      myState.waitingAnswer = false;
      document.getElementById("gameRound").textContent = msg.round_num || state?.round_num || "?";
      if (msg.question) {
        const typeMap = {choice:"📝 选择题",judge:"☑ 判断题",short:"✍ 简答题",fill:"📝 填空题"};
        document.getElementById("gameQType").textContent = typeMap[msg.question_type] || "📝 题目";
        document.getElementById("gameQText").textContent = msg.question;
      }
      document.getElementById("buzzerBtn").disabled = false;
      document.getElementById("buzzerBtn").className = "buzzer-btn waiting-buzz";
      document.getElementById("buzzerBtn").innerHTML = "🔔<br><span style='font-size:12px;font-weight:400;'>抢答</span>";
      document.getElementById("answerArea").style.display = "none";
      document.getElementById("gameStatus").textContent = "🟢 抢答进行中... 快按！";
      resetTimer();
      break;

    case "round_stop":
      document.getElementById("buzzerBtn").disabled = true;
      document.getElementById("buzzerBtn").className = "buzzer-btn";
      document.getElementById("gameStatus").textContent = "⏹ 抢答已停止";
      resetTimer();
      break;

    case "buzz_result":
      if (msg.success) {
        // 抢答成功
        myState.buzzed = true;
        myState.waitingAnswer = true;
        document.getElementById("buzzerBtn").className = "buzzer-btn buzzed";
        document.getElementById("buzzerBtn").innerHTML = "🎉<br><span style='font-size:12px;font-weight:400;'>抢答成功!</span>";
        document.getElementById("buzzerBtn").disabled = true;
        document.getElementById("answerArea").style.display = "block";
        document.getElementById("answerInput").value = "";
        document.getElementById("submitBtn").disabled = false;
        document.getElementById("helpBtn").disabled = false;
        document.getElementById("gameStatus").textContent = "✅ 抢答成功！请输入答案";
        if (msg.timer !== undefined) startCountdown(msg.timer);
      } else {
        // 抢答失败（别人抢到了）
        myState.buzzed = false;
        document.getElementById("buzzerBtn").disabled = true;
        document.getElementById("buzzerBtn").className = "buzzer-btn";
        document.getElementById("gameStatus").textContent = msg.message || "⏳ 别人抢答成功，等待下一轮...";
      }
      break;

    case "judge_result":
      myState.answering = false;
      myState.waitingAnswer = false;
      document.getElementById("answerArea").style.display = "none";
      // 显示结果
      showResult(msg);
      break;

    case "timer_sync":
      if (msg.remaining > 0) startCountdown(msg.remaining);
      else resetTimer();
      break;

    case "help_confirm":
      showToast("🙋 已求助啦啦队，答题时间延长！", "info");
      document.getElementById("helpBtn").disabled = true;
      if (msg.timer !== undefined) startCountdown(msg.timer);
      break;

    case "help_rejected":
      showToast("❌ " + (msg.message || "啦啦队求助失败"), "error");
      break;

    case "correct_answer":
      // 显示正确答案（当设置允许时）
      document.getElementById("gameQType").textContent = "✅ 正确答案";
      if (msg.answer) showToast(`正确答案: ${msg.answer}`, "info");
      break;

    case "game_over":
      showFinalRankings(msg.rankings);
      break;

    case "cleanup":
      // 清理回到等待页
      showPage("pageWait");
      document.getElementById("waitName").textContent = playerName;
      document.getElementById("buzzerBtn").disabled = true;
      document.getElementById("buzzerBtn").className = "buzzer-btn";
      document.getElementById("answerArea").style.display = "none";
      break;

    case "server_shutdown":
      showToast("⚠️ 服务器已关闭", "error");
      break;

    case "player_list":
      const count = msg.players ? msg.players.length : 0;
      document.getElementById("waitPlayerCount").textContent = count > 0
        ? `当前 ${count} 名选手: ${msg.players.join(", ")}`
        : "暂无其他选手";
      break;

    case "pong":
      break;

    default:
      break;
  }

  // 如果有计时信息，启动计时
  if (msg.timer !== undefined && !myState.waitingAnswer) {
    // 不自动启动，由具体消息触发
  }
}

// ========== 页面切换 ==========
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ========== 抢答 ==========
function buzz() {
  if (!ws || ws.readyState !== 1) return;
  if (myState.buzzed || myState.waitingAnswer) return;
  wsSend({type: "buzz"});
  document.getElementById("buzzerBtn").disabled = true;
}

// ========== 提交答案 ==========
function submitAnswer() {
  const input = document.getElementById("answerInput");
  const answer = input.value.trim();
  if (!answer) { showToast("请输入答案", "error"); return; }
  if (!myState.waitingAnswer) { showToast("当前未轮到答题", "error"); return; }
  wsSend({type: "answer", answer: answer});
  document.getElementById("submitBtn").disabled = true;
  document.getElementById("gameStatus").textContent = "📨 答案已提交，等待判题...";
}

// ========== 求助啦啦队 ==========
function askHelp() {
  if (!myState.waitingAnswer) { showToast("当前未在答题", "error"); return; }
  wsSend({type: "help"});
  document.getElementById("helpBtn").disabled = true;
}

// ========== 倒计时 ==========
let countdownInterval = null;

function startCountdown(seconds) {
  if (countdownInterval) clearInterval(countdownInterval);
  const total = seconds;
  let remaining = seconds;
  updateTimerDisplay(remaining, total);

  countdownInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      countdownInterval = null;
      updateTimerDisplay(0, total);
    } else {
      updateTimerDisplay(remaining, total);
    }
  }, 1000);
}

function resetTimer() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  updateTimerDisplay(0, 100);
}

function updateTimerDisplay(remaining, total) {
  const text = document.getElementById("timerText");
  const circle = document.getElementById("timerCircle");
  text.textContent = remaining > 0 ? remaining : "-";
  if (total > 0) {
    const pct = remaining / total;
    const circumference = 314.16;
    circle.style.strokeDashoffset = circumference * (1 - Math.max(0, pct));
    // 颜色变化
    if (pct > 0.5) circle.style.stroke = "#0078d4";
    else if (pct > 0.2) circle.style.stroke = "#FF9800";
    else circle.style.stroke = "#f44336";
  }
}

// ========== 结果显示 ==========
function showResult(msg) {
  const overlay = document.getElementById("resultOverlay");
  const content = document.getElementById("resultContent");

  let icon = "❓", title = "", scoreChange = "", color = "";
  if (msg.correct) {
    icon = "🎉"; title = "回答正确！";
    scoreChange = `+${msg.score_change || 0}`;
    color = "correct";
  } else if (msg.timeout) {
    icon = "⏰"; title = "答题超时";
    scoreChange = `${msg.score_change || 0}`;
    color = "timeout";
  } else {
    icon = "❌"; title = "回答错误";
    scoreChange = `${msg.score_change || 0}`;
    color = "wrong";
  }

  content.innerHTML = `
    <div class="result-box">
      <div class="icon">${icon}</div>
      <h2>${title}</h2>
      <div class="score-change ${color}">${scoreChange}</div>
      <div class="total-score">当前积分: <strong>${msg.score || 0}</strong></div>
      <button class="btn btn-primary" onclick="closeResult()">继续</button>
    </div>
  `;

  overlay.classList.add("show");
}

function closeResult() {
  document.getElementById("resultOverlay").classList.remove("show");
  document.getElementById("buzzerBtn").disabled = true;
  document.getElementById("buzzerBtn").className = "buzzer-btn";
  document.getElementById("answerArea").style.display = "none";
  document.getElementById("gameStatus").textContent = "⏳ 等待下一轮...";
  myState.buzzed = false;
  myState.waitingAnswer = false;
}

function showFinalRankings(rankings) {
  const overlay = document.getElementById("resultOverlay");
  const content = document.getElementById("resultContent");

  let rows = (rankings || []).map((p, i) => {
    const cls = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : `${i+1}`;
    return `<tr><td class="rn ${cls}">${medal}</td><td>${p.name}</td><td><strong>${p.score}</strong></td></tr>`;
  }).join("");

  content.innerHTML = `
    <div class="rankings-box">
      <h2>🏆 比赛结束 · 最终排名</h2>
      <table>
        <thead><tr><th>#</th><th>选手</th><th>积分</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <button class="btn btn-primary" style="margin-top:16px;" onclick="closeRankings()">确定</button>
    </div>
  `;

  overlay.classList.add("show");
}

function closeRankings() {
  document.getElementById("resultOverlay").classList.remove("show");
  showPage("pageConnect");
  document.getElementById("connectBtn").disabled = false;
  document.getElementById("connectBtn").textContent = "🔗 加入比赛";
}

// ========== Toast ==========
let clientToastTimeout;

function showToast(msg, type) {
  const t = document.getElementById("clientToast");
  t.textContent = msg;
  t.className = "toast " + type;
  t.classList.add("show");
  clearTimeout(clientToastTimeout);
  clientToastTimeout = setTimeout(() => t.classList.remove("show"), 2500);
}

// ========== 键盘快捷键 ==========
document.addEventListener("keydown", function(e) {
  // 空格抢答
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.code === "Space") {
    e.preventDefault();
    const btn = document.getElementById("buzzerBtn");
    if (!btn.disabled) buzz();
  }
});
</script>
</body>
</html>

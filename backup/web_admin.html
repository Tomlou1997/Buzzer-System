<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 抢答系统 · 管理端</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
    background: #0f0f1a; color: #fff; height: 100vh; display: flex; overflow: hidden;
  }
  .sidebar { width: 64px; min-width: 64px; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 4px; border-right: 1px solid #2a2a3e; }
  .sidebar .logo { width: 36px; height: 36px; background: linear-gradient(135deg,#0078d4,#00bcd4); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 16px; }
  .sidebar .nav-item { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.2s; color: #555; position: relative; }
  .sidebar .nav-item:hover { background: #2a2a3e; color: #fff; }
  .sidebar .nav-item.active { background: linear-gradient(135deg,#0078d4,#005a9e); color: #fff; box-shadow: 0 4px 12px rgba(0,120,212,0.3); }
  .sidebar .spacer { flex: 1; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .top-bar { height: 50px; min-height: 50px; background: #1a1a2e; border-bottom: 1px solid #2a2a3e; display: flex; align-items: center; padding: 0 20px; gap: 12px; }
  .top-bar .title { font-size: 15px; font-weight: 600; color: #0078d4; }
  .top-bar .game-name { font-size: 12px; color: #888; background: #252538; padding: 3px 10px; border-radius: 5px; }
  .top-bar .status-area { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; }
  .top-bar .status-area .dot { width: 7px; height: 7px; border-radius: 50%; }
  .top-bar .status-area .dot.green { background: #4CAF50; box-shadow: 0 0 8px rgba(76,175,80,0.5); }
  .top-bar .status-area .dot.yellow { background: #FF9800; box-shadow: 0 0 8px rgba(255,152,0,0.5); }
  .top-bar .status-area .dot.red { background: #f44336; box-shadow: 0 0 8px rgba(244,67,54,0.5); }
  .top-bar .status-area .dot.off { background: #555; }
  .page { display: none; flex: 1; }
  .page.active { display: flex; flex-direction: column; }
  .game-content { flex: 1; display: flex; padding: 16px; gap: 16px; min-height: 0; }
  .players-panel { width: 230px; min-width: 230px; background: #1a1a2e; border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 6px; }
  .players-panel .panel-title { font-size: 13px; font-weight: 600; color: #0078d4; padding-bottom: 6px; border-bottom: 1px solid #2a2a3e; display: flex; justify-content: space-between; }
  .player-card { background: #252538; border-radius: 6px; padding: 7px 10px; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; font-size: 12px; position: relative; }
  .player-card:hover { border-color: #0078d4; background: #2a2a3e; }
  .player-card .rank-badge { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; }
  .player-card .rank-badge.gold { background: #FFD700; color: #1a1a2e; }
  .player-card .rank-badge.silver { background: #C0C0C0; color: #1a1a2e; }
  .player-card .rank-badge.bronze { background: #CD7F32; color: #fff; }
  .player-card .rank-badge.normal { background: #333; color: #888; }
  .player-card .pname { flex: 1; font-size: 12px; font-weight: 500; }
  .player-card .pscore { font-size: 13px; font-weight: bold; color: #4CAF50; }
  .player-card .banned-tag { font-size: 10px; color: #f44336; }
  .player-card .context-menu { display: none; position: absolute; top: 100%; left: 0; z-index: 100; background: #2a2a3e; border: 1px solid #444; border-radius: 6px; padding: 4px; min-width: 120px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .player-card .context-menu.show { display: block; }
  .context-menu .menu-item { padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; white-space: nowrap; }
  .context-menu .menu-item:hover { background: #0078d4; }
  .context-menu .menu-item.danger:hover { background: #f44336; }
  .panel-actions { margin-top: auto; display: flex; flex-direction: column; gap: 4px; padding-top: 8px; border-top: 1px solid #2a2a3e; }
  .right-area { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .info-bar { display: flex; gap: 8px; }
  .info-item { flex: 1; background: #1a1a2e; border-radius: 8px; padding: 10px; text-align: center; }
  .info-item .ilabel { font-size: 10px; color: #888; }
  .info-item .ivalue { font-size: 16px; font-weight: bold; margin-top: 2px; }
  .info-item .ivalue.blue { color: #0078d4; }
  .info-item .ivalue.green { color: #4CAF50; }
  .info-item .ivalue.orange { color: #FF9800; }
  .info-item .ivalue.purple { color: #9C27B0; }
  .banner { background: linear-gradient(135deg,#4CAF50,#66BB6A); border-radius: 8px; padding: 12px 16px; text-align: center; font-size: 14px; font-weight: 600; min-height: 46px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
  .question-card { flex: 1; background: #1a1a2e; border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
  .question-card .q-type { font-size: 11px; color: #FF9800; font-weight: 600; }
  .question-card .q-text { flex: 1; background: #1e1e2e; border-radius: 6px; padding: 12px; font-size: 14px; line-height: 1.8; overflow-y: auto; min-height: 60px; }
  .question-card .q-answer { background: #252538; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #4CAF50; display: none; }
  .question-card .q-answer.show { display: block; }
  .question-card .q-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .question-card .q-actions .nav-group { display: flex; gap: 4px; }
  .record-bar { background: #1a1a2e; border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 12px; }
  .record-bar:hover { background: #1e1e2e; }
  .record-bar .rtext { color: #888; flex: 1; }
  .record-bar .rcount { background: #0078d4; color: #fff; font-size: 10px; padding: 1px 8px; border-radius: 8px; }
  .record-table { display: none; background: #1a1a2e; border-radius: 8px; padding: 8px; max-height: 120px; overflow-y: auto; }
  .record-table.show { display: block; }
  .record-table table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .record-table th { color: #888; text-align: left; padding: 4px 8px; border-bottom: 1px solid #333; }
  .record-table td { padding: 4px 8px; border-bottom: 1px solid #252525; }
  .record-table .tag { padding: 1px 6px; border-radius: 3px; font-size: 10px; }
  .record-table .tag.green { background: #1a3a1a; color: #4CAF50; }
  .record-table .tag.red { background: #3a1a1a; color: #f44336; }
  .record-table .tag.gray { background: #333; color: #aaa; }
  .bank-page { padding: 20px; gap: 16px; }
  .bank-header { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .bank-header h2 { font-size: 16px; }
  .bank-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
  .bank-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px; padding: 14px; width: 220px; cursor: pointer; transition: all 0.2s; }
  .bank-card:hover { border-color: #0078d4; }
  .bank-card.active { border-color: #0078d4; background: #1a2a3e; }
  .bank-card .bname { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .bank-card .binfo { font-size: 11px; color: #888; }
  .bank-card .bactions { margin-top: 8px; display: flex; gap: 4px; }
  .bank-card .bactions .btn { font-size: 11px; padding: 3px 10px; }
  .settings-page { padding: 20px; gap: 16px; max-width: 500px; }
  .settings-page h2 { font-size: 16px; margin-bottom: 12px; }
  .settings-group { margin-bottom: 12px; }
  .settings-group label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  .settings-group input,.settings-group select { width: 100%; padding: 7px 10px; background: #252538; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 13px; outline: none; }
  .settings-group input:focus { border-color: #0078d4; }
  .settings-row { display: flex; gap: 12px; }
  .settings-row .settings-group { flex: 1; }
  .settings-check { display: flex; align-items: center; gap: 8px; margin: 4px 0; cursor: pointer; font-size: 13px; }
  .settings-check input { width: auto; }
  .btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: #0078d4; color: #fff; }
  .btn-primary:hover { background: #1a8ae8; }
  .btn-success { background: #4CAF50; color: #fff; }
  .btn-success:hover { background: #66BB6A; }
  .btn-danger { background: #f44336; color: #fff; }
  .btn-danger:hover { background: #ef5350; }
  .btn-warning { background: #FF9800; color: #fff; }
  .btn-warning:hover { background: #FFB74D; }
  .btn-ghost { background: #2a2a3e; color: #ccc; }
  .btn-ghost:hover { background: #333350; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }
  .btn-block { width: 100%; justify-content: center; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 999; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a2e; border-radius: 14px; padding: 20px; width: 400px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .modal h3 { font-size: 15px; margin-bottom: 12px; }
  .modal .form-group { margin-bottom: 10px; }
  .modal .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 3px; }
  .modal .form-group input,.modal .form-group select { width: 100%; padding: 7px 10px; background: #252538; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 13px; outline: none; }
  .modal .form-group input:focus { border-color: #0078d4; }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }
  .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 10px 20px; border-radius: 8px; font-size: 13px; transform: translateX(120%); transition: transform 0.3s; max-width: 350px; }
  .toast.show { transform: translateX(0); }
  .toast.info { background: #0078d4; color: #fff; }
  .toast.success { background: #4CAF50; color: #fff; }
  .toast.error { background: #f44336; color: #fff; }
  .log-panel { display: none; position: fixed; bottom: 0; right: 0; width: 400px; height: 250px; background: #1a1a2e; border-top: 1px solid #2a2a3e; border-left: 1px solid #2a2a3e; border-radius: 10px 0 0 0; z-index: 100; flex-direction: column; }
  .log-panel.show { display: flex; }
  .log-panel .log-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 1px solid #2a2a3e; font-size: 12px; }
  .log-panel .log-body { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 11px; font-family: monospace; color: #aaa; }
  .log-panel .log-body div { padding: 2px 0; border-bottom: 1px solid #1e1e2e; }
  .modal .rankings-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 12px; }
  .modal .rankings-table th { color: #888; text-align: left; padding: 6px 8px; border-bottom: 1px solid #333; }
  .modal .rankings-table td { padding: 6px 8px; border-bottom: 1px solid #252525; }
  .modal .rankings-table .rank-num { font-weight: bold; width: 30px; }
  .modal .rankings-table .rank-num.gold { color: #FFD700; }
  .modal .rankings-table .rank-num.silver { color: #C0C0C0; }
  .modal .rankings-table .rank-num.bronze { color: #CD7F32; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🎯</div>
  <div class="nav-item active" data-page="game-page" title="比赛控制台">🎮</div>
  <div class="nav-item" data-page="bank-page" title="题库管理">📚</div>
  <div class="nav-item" data-page="settings-page" title="设置">⚙</div>
  <div class="nav-item" onclick="toggleLog()" title="日志">📋</div>
  <div class="spacer"></div>
  <div class="nav-item" onclick="fullscreen()" title="全屏">⛶</div>
</div>

<div class="main">
  <div class="top-bar">
    <span class="title">🎯 抢答系统 · 主控端</span>
    <span class="game-name" id="topGameName">未开始</span>
    <div class="status-area">
      <div class="dot green" id="statusDot"></div>
      <span id="statusText">运行中</span>
      <span style="color:#555;margin-left:8px;">|</span>
      <span id="playerCount">0</span> 名选手
      <span style="color:#555;margin-left:8px;">|</span>
      <span id="portDisplay">端口 8888</span>
    </div>
  </div>

  <!-- 比赛页面 -->
  <div class="page active" id="game-page">
    <div style="padding:8px 16px 0;display:flex;gap:6px;align-items:center;">
      <span style="font-size:12px;color:#888;">📚</span>
      <select id="bankSelect" style="background:#252538;border:1px solid #333;border-radius:5px;color:#fff;padding:4px 8px;font-size:12px;outline:none;" onchange="activateBank(this.value)"></select>
      <button class="btn btn-ghost btn-sm" onclick="startGame()" id="startGameBtn">🚀 开始比赛</button>
    </div>
    <div class="game-content">
      <div class="players-panel">
        <div class="panel-title">
          <span>👥 选手</span>
          <span id="playerCount2" style="color:#888;font-size:11px;">0</span>
        </div>
        <div id="playerList"></div>
        <div class="panel-actions">
          <button class="btn btn-ghost btn-sm btn-block" onclick="showSettings()">⚙ 设置</button>
          <button class="btn btn-warning btn-sm btn-block" id="restartBtn" style="display:none;" onclick="restartGame()">🔄 重赛</button>
          <button class="btn btn-danger btn-sm btn-block" id="endGameBtn" style="display:none;" onclick="endGame()">🏁 结束比赛</button>
        </div>
      </div>
      <div class="right-area">
        <div class="info-bar">
          <div class="info-item"><div class="ilabel">📚 题库</div><div class="ivalue blue" id="infoBank">-</div></div>
          <div class="info-item"><div class="ilabel">🎯 轮次</div><div class="ivalue orange" id="infoRound">0</div></div>
          <div class="info-item"><div class="ilabel">✅ 进度</div><div class="ivalue green" id="infoProgress">0/0</div></div>
          <div class="info-item"><div class="ilabel">⏱ 倒计时</div><div class="ivalue orange" id="infoTimer">-</div></div>
          <div class="info-item"><div class="ilabel">📊 已答</div><div class="ivalue blue" id="infoAnswered">-</div></div>
        </div>
        <div class="banner" id="banner">⏳ 等待开始比赛...</div>
        <div class="question-card">
          <div class="q-type" id="qType">📝 题目</div>
          <div class="q-text" id="qText">请导入题库或选择题目开始</div>
          <div class="q-answer" id="qAnswer">✅ 参考答案: <span id="answerText"></span></div>
          <div class="q-actions">
            <div class="nav-group">
              <button class="btn btn-ghost btn-sm" onclick="prevQuestion()">◀ 上一题</button>
              <button class="btn btn-ghost btn-sm" onclick="nextQuestion()">▶ 下一题</button>
            </div>
            <div class="nav-group" style="margin-left:16px;">
              <button class="btn btn-success btn-sm" id="startRoundBtn" onclick="startRound()">🚀 开始抢答</button>
              <span style="font-size:14px;font-weight:bold;color:#FF9800;padding:0 8px;" id="roundTimer"></span>
              <button class="btn btn-danger btn-sm" id="stopRoundBtn" onclick="stopRound()">■ 结束抢答</button>
            </div>
            <div style="margin-left:auto;display:flex;gap:4px;">
              <button class="btn btn-primary btn-sm" id="showAnswerBtn" onclick="toggleAnswer()">👁 显示答案</button>
              <button class="btn btn-ghost btn-sm" onclick="showRankings()">🏆 积分榜</button>
            </div>
          </div>
        </div>
        <div class="record-bar" onclick="toggleRecord()">
          <span>📋</span>
          <span class="rtext">抢答记录 · 点击展开</span>
          <span class="rcount" id="recordCount">0</span>
        </div>
        <div class="record-table" id="recordTable">
          <table><thead><tr><th>选手</th><th>答案</th><th>结果</th><th>正确答案</th></tr></thead>
          <tbody id="recordBody"></tbody></table>
        </div>
      </div>
    </div>
  </div>

  <!-- 题库管理页 -->
  <div class="page" id="bank-page" style="padding:20px;">
    <div class="bank-header">
      <h2>📚 题库管理</h2>
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('uploadInput').click()">📤 导入题库</button>
      <input type="file" id="uploadInput" accept=".xlsx,.xls" style="display:none" onchange="uploadBank(this)">
    </div>
    <div class="bank-list" id="bankList" style="margin-top:12px;"></div>
  </div>

  <!-- 设置页 -->
  <div class="page" id="settings-page" style="padding:20px;max-width:500px;">
    <h2 style="font-size:16px;margin-bottom:12px;">⚙ 设置</h2>
    <div class="settings-row">
      <div class="settings-group"><label>答对加分</label><input type="number" id="setCorrect" value="2"></div>
      <div class="settings-group"><label>答错扣分</label><input type="number" id="setWrong" value="1"></div>
      <div class="settings-group"><label>答题倒计时(秒)</label><input type="number" id="setTimeout" value="15"></div>
    </div>
    <div class="settings-row">
      <div class="settings-group"><label>获胜积分</label><input type="number" id="setWinScore" value="20"></div>
      <div class="settings-group"><label>决出前几名</label><input type="number" id="setWinRank" value="3"></div>
    </div>
    <div class="settings-row">
      <div class="settings-group"><label>啦啦队可求助次数</label><input type="number" id="setExtendMax" value="1"></div>
      <div class="settings-group"><label>每次增加秒数</label><input type="number" id="setExtendSec" value="15"></div>
    </div>
    <div style="margin:8px 0;">
      <label class="settings-check"><input type="checkbox" id="setRepeat"> ♻️ 题目可重复使用</label>
      <label class="settings-check"><input type="checkbox" id="setShowRestart"> 🔄 显示重赛按钮</label>
      <label class="settings-check"><input type="checkbox" id="setShowEnd"> 🏁 显示结束比赛按钮</label>
      <label class="settings-check"><input type="checkbox" id="setShowAnswer"> 👁 显示参考答案</label>
    </div>
    <button class="btn btn-primary" onclick="saveSettings()">💾 保存设置</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Log -->
<div class="log-panel" id="logPanel">
  <div class="log-header">
    <span>📋 系统日志</span>
    <button class="btn btn-ghost btn-sm" onclick="toggleLog()">✕</button>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<script>
let ws = null;
let state = {};
let logVisible = false;
let recordVisible = false;
let answerVisible = false;

// ========== WebSocket ==========
function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws/admin`);
  ws.onmessage = function(e) {
    const msg = JSON.parse(e.data);
    if (msg.type === "pong") return;
    fetchState();
  };
  ws.onclose = function() { setTimeout(connectWS, 2000); };
}
connectWS();

// ========== 状态获取 ==========
async function fetchState() {
  try {
    const r = await fetch("/api/state");
    state = await r.json();
    render();
  } catch(e) {}
}
setInterval(fetchState, 2000);
fetchState();

// ========== API 调用 ==========
async function apiCall(action, data) {
  try {
    const r = await fetch("/api/action", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({action, ...data})
    });
    const res = await r.json();
    if (res.error) { showToast(res.error, "error"); return null; }
    showToast(res.message || "操作成功", "success");
    fetchState();
    return res;
  } catch(e) {
    showToast("请求失败: "+e.message, "error");
    return null;
  }
}

function showToast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast " + type;
  t.classList.add("show");
  clearTimeout(t._hide);
  t._hide = setTimeout(()=>t.classList.remove("show"), 2500);
}

// ========== 页面切换 ==========
document.querySelectorAll(".nav-item[data-page]").forEach(el => {
  el.addEventListener("click", function() {
    document.querySelectorAll(".nav-item[data-page]").forEach(x=>x.classList.remove("active"));
    this.classList.add("active");
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(this.dataset.page).classList.add("active");
  });
});

function fullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

function toggleLog() {
  logVisible = !logVisible;
  document.getElementById("logPanel").classList.toggle("show", logVisible);
}

function toggleRecord() {
  recordVisible = !recordVisible;
  document.getElementById("recordTable").classList.toggle("show", recordVisible);
}

function toggleAnswer() {
  answerVisible = !answerVisible;
  document.getElementById("qAnswer").classList.toggle("show", answerVisible);
  document.querySelector("#showAnswerBtn").textContent = answerVisible ? "🙈 隐藏答案" : "👁 显示答案";
}

// ========== 渲染主函数 ==========
function render() {
  const s = state;
  if (!s || !s.players) return;

  // 顶部状态
  document.getElementById("topGameName").textContent = s.game_name || "未开始";
  document.getElementById("playerCount").textContent = s.players.length;
  document.getElementById("playerCount2").textContent = s.players.length;
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  if (s.game_over) {
    statusText.textContent = "已结束";
    statusDot.className = "dot red";
  } else if (s.game_started) {
    if (s.round_active || s.first_buzzer) {
      statusText.textContent = "抢答中";
      statusDot.className = "dot green";
    } else {
      statusText.textContent = "比赛中";
      statusDot.className = "dot yellow";
    }
  } else {
    statusText.textContent = "等待中";
    statusDot.className = "dot off";
  }
  document.getElementById("portDisplay").textContent = s.server_port ? `端口 ${s.server_port}` : "端口 8888";

  // 选手列表
  renderPlayers(s.players);

  // 题库下拉
  const bankSel = document.getElementById("bankSelect");
  bankSel.innerHTML = '<option value="">-- 选择题库 --</option>';
  (s.banks || []).forEach(b => {
    const opt = document.createElement("option");
    opt.value = b; opt.textContent = b;
    if (b === s.active_bank) opt.selected = true;
    bankSel.appendChild(opt);
  });

  // 信息栏
  document.getElementById("infoBank").textContent = s.active_bank || "-";
  document.getElementById("infoRound").textContent = s.round_num || 0;
  const q = s.question || {};
  const qIdx = q.index !== undefined ? q.index + 1 : 0;
  const qTotal = q.total || 0;
  document.getElementById("infoProgress").textContent = qTotal ? `${qIdx}/${qTotal}` : "0/0";
  document.getElementById("infoTimer").textContent = s.timer_remaining > 0 ? `${s.timer_remaining}s` : "-";
  document.getElementById("infoAnswered").textContent = q.total ? (q.used ? "是" : "否") : "-";

  // 横幅
  const banner = document.getElementById("banner");
  if (s.first_buzzer && s.timer_remaining > 0) {
    const name = s.first_buzzer;
    const tm = s.timer_remaining;
    banner.textContent = s.has_extended
      ? `🎉🎉🎉 [${name}] 求助啦啦队！答题时间延长 ⏱ ${tm}s 🎉🎉🎉`
      : `🎉🎉🎉 [${name}] 抢答成功！等待输入答案 ⏱ ${tm}s 🎉🎉🎉`;
    banner.style.background = "linear-gradient(135deg,#4CAF50,#66BB6A)";
  } else if (s.round_active) {
    banner.textContent = `🟢 第 ${s.round_num} 轮抢答进行中...`;
    banner.style.background = "linear-gradient(135deg,#2196F3,#42A5F5)";
  } else if (s.game_over) {
    banner.textContent = "🏁 比赛已结束";
    banner.style.background = "linear-gradient(135deg,#9C27B0,#AB47BC)";
  } else if (s.game_started) {
    banner.textContent = "⏳ 等待开始抢答...";
    banner.style.background = "linear-gradient(135deg,#FF9800,#FFB74D)";
  } else {
    banner.textContent = "⏳ 等待开始比赛...";
    banner.style.background = "linear-gradient(135deg,#555,#666)";
  }

  // 题目
  if (q.question) {
    const typeMap = {choice:"📝 选择题",judge:"☑ 判断题",short:"✍ 简答题",fill:"📝 填空题"};
    document.getElementById("qType").textContent = typeMap[q.type] || `📝 ${q.type}`;
    document.getElementById("qText").textContent = q.question;
  }
  document.getElementById("answerText").textContent = q.answer || "--";
  document.getElementById("qAnswer").classList.toggle("show", answerVisible && !!q.answer);

  // 按钮可见性
  const settings = s.settings || {};
  document.getElementById("showAnswerBtn").style.display = (settings.show_answer_ref !== false) ? "" : "none";
  document.getElementById("restartBtn").style.display = settings.show_restart_btn ? "" : "none";
  document.getElementById("endGameBtn").style.display = settings.show_endgame_btn ? "" : "none";

  // 按钮状态
  const startRoundBtn = document.getElementById("startRoundBtn");
  const stopRoundBtn = document.getElementById("stopRoundBtn");
  startRoundBtn.disabled = !s.game_started || s.game_over || !!s.round_active;
  stopRoundBtn.disabled = !s.round_active;
  document.getElementById("roundTimer").textContent = s.timer_remaining > 0 ? `⏱ ${s.timer_remaining}s` : "";

  // 开始比赛按钮
  const startBtn = document.getElementById("startGameBtn");
  if (s.game_started) {
    startBtn.textContent = "▶ 继续比赛";
    startBtn.className = "btn btn-success btn-sm";
  } else {
    startBtn.textContent = "🚀 开始比赛";
    startBtn.className = "btn btn-primary btn-sm";
  }
  startBtn.disabled = !s.active_bank;

  // 抢答记录
  renderRecords(s.records);

  // 日志
  renderLogs(s.logs);

  // 题库管理
  renderBanks(s.banks, s.active_bank);
}

// ========== 选手列表渲染 ==========
function renderPlayers(players) {
  const list = document.getElementById("playerList");
  if (!players || players.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:12px;padding:10px;text-align:center;">暂无选手连接</div>';
    return;
  }

  // 按积分排序
  const sorted = [...players].sort((a, b) => (b.score||0) - (a.score||0));
  list.innerHTML = sorted.map((p, i) => {
    const rankCls = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "normal";
    const badge = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i+1);
    const banned = p.banned ? '<span class="banned-tag">🚫</span>' : "";
    return `
      <div class="player-card" onclick="showPlayerMenu(this,'${p.name}')">
        <span class="rank-badge ${rankCls}">${badge}</span>
        <span class="pname">${p.name}${banned}</span>
        <span class="pscore">${p.score||0}</span>
        <div class="context-menu" id="menu_${p.name}">
          <div class="menu-item" onclick="event.stopPropagation();kickPlayer('${p.name}')">👢 踢出</div>
          <div class="menu-item ${p.banned?'':'danger'}" onclick="event.stopPropagation();banPlayer('${p.name}',${!p.banned})">${p.banned?'✅ 解除禁赛':'🚫 禁赛'}</div>
        </div>
      </div>`;
  }).join("");
}

function showPlayerMenu(el, name) {
  // 关闭其他
  document.querySelectorAll(".context-menu.show").forEach(m => m.classList.remove("show"));
  const menu = document.getElementById("menu_"+name);
  if (menu) menu.classList.toggle("show");
}

// 点击别处关闭菜单
document.addEventListener("click", function(e) {
  if (!e.target.closest(".player-card")) {
    document.querySelectorAll(".context-menu.show").forEach(m => m.classList.remove("show"));
  }
});

// ========== 操作函数 ==========
function startGame() {
  apiCall("start_game");
}

function restartGame() {
  if (confirm("确定要重赛吗？所有积分和记录将重置。")) {
    apiCall("restart_game");
  }
}

function endGame() {
  if (confirm("确定要结束当前比赛吗？")) {
    apiCall("end_game");
  }
}

function activateBank(name) {
  if (!name) return;
  apiCall("activate_bank", {bank_name: name});
}

function startRound() {
  apiCall("start_round");
}

function stopRound() {
  apiCall("stop_round");
}

function nextQuestion() {
  apiCall("next_question");
}

function prevQuestion() {
  apiCall("prev_question");
}

function kickPlayer(name) {
  if (confirm(`确定踢出选手 [${name}] 吗？`)) {
    apiCall("kick_player", {player_name: name});
  }
}

function banPlayer(name, ban) {
  apiCall("ban_player", {player_name: name, ban: ban});
}

function showSettings() {
  const s = state.settings || {};
  document.getElementById("setCorrect").value = s.correct_score || 2;
  document.getElementById("setWrong").value = s.wrong_score || 1;
  document.getElementById("setTimeout").value = s.timeout || 15;
  document.getElementById("setWinScore").value = s.win_score || 20;
  document.getElementById("setWinRank").value = s.win_rank_count || 3;
  document.getElementById("setExtendMax").value = s.extend_max || 1;
  document.getElementById("setExtendSec").value = s.extend_seconds || 15;
  document.getElementById("setRepeat").checked = s.repeat_questions || false;
  document.getElementById("setShowRestart").checked = s.show_restart_btn !== false;
  document.getElementById("setShowEnd").checked = s.show_endgame_btn !== false;
  document.getElementById("setShowAnswer").checked = s.show_answer_ref !== false;

  // 切换到设置页
  document.querySelectorAll(".nav-item[data-page]").forEach(x=>x.classList.remove("active"));
  document.querySelector('.nav-item[data-page="settings-page"]').classList.add("active");
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("settings-page").classList.add("active");
}

function saveSettings() {
  apiCall("save_settings", {
    correct_score: parseInt(document.getElementById("setCorrect").value) || 2,
    wrong_score: parseInt(document.getElementById("setWrong").value) || 1,
    timeout: parseInt(document.getElementById("setTimeout").value) || 15,
    win_score: parseInt(document.getElementById("setWinScore").value) || 20,
    win_rank_count: parseInt(document.getElementById("setWinRank").value) || 3,
    extend_max: parseInt(document.getElementById("setExtendMax").value) || 1,
    extend_seconds: parseInt(document.getElementById("setExtendSec").value) || 15,
    repeat_questions: document.getElementById("setRepeat").checked,
    show_restart_btn: document.getElementById("setShowRestart").checked,
    show_endgame_btn: document.getElementById("setShowEnd").checked,
    show_answer_ref: document.getElementById("setShowAnswer").checked
  });
}

function showRankings() {
  const s = state;
  if (!s || !s.players) return;
  const sorted = [...s.players].sort((a,b) => (b.score||0) - (a.score||0));
  let rows = sorted.map((p,i) => {
    const cls = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : (i+1);
    return `<tr><td class="rank-num ${cls}">${medal}</td><td>${p.name}</td><td><strong>${p.score||0}</strong></td></tr>`;
  }).join("");

  showModal(`
    <h3>🏆 积分榜</h3>
    <table class="rankings-table">
      <thead><tr><th>#</th><th>选手</th><th>积分</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">关闭</button>
    </div>
  `);
}

function showModal(html) {
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modalOverlay").classList.add("show");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("show");
}

// ========== 抢答记录 ==========
function renderRecords(records) {
  const body = document.getElementById("recordBody");
  const count = document.getElementById("recordCount");
  if (!records || records.length === 0) {
    body.innerHTML = '<tr><td colspan="4" style="color:#555;text-align:center;">暂无记录</td></tr>';
    count.textContent = "0";
    return;
  }
  count.textContent = records.length;
  body.innerHTML = records.slice(-20).reverse().map(r => {
    const tagCls = r.correct ? "green" : (r.timeout ? "gray" : "red");
    const tagText = r.correct ? "✅正确" : (r.timeout ? "⏰超时" : "❌错误");
    return `<tr>
      <td>${r.player||"-"}</td>
      <td>${r.answer||"-"}</td>
      <td><span class="tag ${tagCls}">${tagText}</span></td>
      <td>${r.correct_answer||"-"}</td>
    </tr>`;
  }).join("");
}

// ========== 日志 ==========
function renderLogs(logs) {
  if (!logs || logs.length === 0) return;
  const body = document.getElementById("logBody");
  // 只取最新的50条
  body.innerHTML = logs.slice(-50).reverse().map(l => `<div>${l}</div>`).join("");
}

// ========== 题库管理 ==========
function renderBanks(banks, active) {
  const list = document.getElementById("bankList");
  if (!banks || banks.length === 0) {
    list.innerHTML = '<div style="color:#555;font-size:13px;">暂无题库，请点击上方"导入题库"按钮上传 xlsx 文件</div>';
    return;
  }
  list.innerHTML = banks.map(b => `
    <div class="bank-card ${b === active ? 'active' : ''}" onclick="activateBank('${b}')">
      <div class="bname">${b}</div>
      <div class="binfo">${b === active ? '✅ 当前使用中' : '点击激活'}</div>
      <div class="bactions">
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteBank('${b}')">🗑 删除</button>
      </div>
    </div>
  `).join("");
}

async function uploadBank(input) {
  const file = input.files[0];
  if (!file) return;
  const formData = new FormData();
  formData.append("file", file);
  try {
    const r = await fetch("/api/upload_bank", { method: "POST", body: formData });
    const res = await r.json();
    if (res.error) { showToast(res.error, "error"); return; }
    showToast(res.message || "导入成功", "success");
    fetchState();
  } catch(e) {
    showToast("上传失败: "+e.message, "error");
  }
  input.value = "";
}

async function deleteBank(name) {
  if (!confirm(`确定删除题库 [${name}] 吗？`)) return;
  try {
    const r = await fetch("/api/delete_bank", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({bank_name: name})
    });
    const res = await r.json();
    if (res.error) { showToast(res.error, "error"); return; }
    showToast(res.message || "删除成功", "success");
    fetchState();
  } catch(e) {
    showToast("删除失败: "+e.message, "error");
  }
}

// 初始加载
fetchState();
</script>
